services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nexusdeploy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nexusdeploy
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ENV=development
      - VERSION=local-dev
      - SECRET_KEY=dev-secret-key-DO-NOT-USE-IN-PROD-32b
      - JWT_SECRET_KEY=dev-secret-key-DO-NOT-USE-IN-PROD-32b
      - AWS_REGION=us-east-1
      - S3_BUCKET=nexusdeploy-attachments-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./app:/app  # For development hot-reload

  worker:
    build:
      context: ./app
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nexusdeploy
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ENV=development
      - SECRET_KEY=dev-secret-key-DO-NOT-USE-IN-PROD-32b
      - JWT_SECRET_KEY=dev-secret-key-DO-NOT-USE-IN-PROD-32b
      - AWS_REGION=us-east-1
      - S3_BUCKET=nexusdeploy-attachments-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app

  beat:
    build:
      context: ./app
      dockerfile: Dockerfile.worker
    command: celery -A src.celery_worker:celery beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nexusdeploy
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ENV=development
      - SECRET_KEY=dev-secret-key-DO-NOT-USE-IN-PROD-32b
      - JWT_SECRET_KEY=dev-secret-key-DO-NOT-USE-IN-PROD-32b
    depends_on:
      redis:
        condition: service_healthy 

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  postgres_data: