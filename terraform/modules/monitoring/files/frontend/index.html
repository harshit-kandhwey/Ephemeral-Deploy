<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ephemeral Deploy — Console</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --panel-2: #1c2333; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7; --accent-2: #1f6feb;
      --ok: #3fb950; --warn: #d29922; --err: #f85149; --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    a { color: var(--accent); }
    .hidden { display: none !important; }

    /* ── Login ── */
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; width: 100%; max-width: 380px;
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
    .brand h1 { font-size: 18px; margin: 0; }
    .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
    input, select {
      width: 100%; padding: 10px 12px; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    button {
      cursor: pointer; border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      padding: 10px 16px; background: var(--accent-2); color: #fff; transition: filter .15s;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-block { width: 100%; margin-top: 20px; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .msg { margin-top: 14px; font-size: 13px; min-height: 18px; }
    .msg.err { color: var(--err); }

    /* ── App shell ── */
    header {
      display: flex; align-items: center; gap: 16px; padding: 12px 20px;
      background: var(--panel); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5;
    }
    header .brand h1 { font-size: 16px; }
    .spacer { flex: 1; }
    .health {
      display: inline-flex; align-items: center; gap: 8px; font-size: 12px;
      color: var(--muted); border: 1px solid var(--border); padding: 5px 10px; border-radius: 20px;
    }
    .health .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .health.ok .pulse { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .health.bad .pulse { background: var(--err); box-shadow: 0 0 8px var(--err); }
    .whoami { font-size: 13px; color: var(--muted); }
    .whoami b { color: var(--text); }
    .role { font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
      background: var(--panel-2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px; margin-left: 6px; }

    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
    .tab {
      padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--muted);
      background: transparent; border: 1px solid transparent;
    }
    .tab.active { color: var(--text); background: var(--panel); border-color: var(--border); }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .panel-head { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .panel-head h2 { font-size: 15px; margin: 0; }
    .count { font-size: 12px; color: var(--muted); }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--panel-2); }
    .empty, .loading { padding: 28px 16px; color: var(--muted); text-align: center; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <!-- ── Login view ── -->
  <div id="login" class="login-wrap">
    <form class="card" id="login-form">
      <div class="brand"><span class="dot"></span><h1>Ephemeral Deploy</h1></div>
      <p class="sub">Project Management Console</p>
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button class="btn-block" id="login-btn" type="submit">Sign in</button>
      <div class="msg" id="login-msg"></div>
    </form>
  </div>

  <!-- ── App view ── -->
  <div id="app" class="hidden">
    <header>
      <div class="brand"><span class="dot"></span><h1>Ephemeral Deploy</h1></div>
      <div class="health" id="health" title="API /health"><span class="pulse"></span><span id="health-text">checking…</span></div>
      <div class="spacer"></div>
      <div class="whoami" id="whoami"></div>
      <button class="btn-ghost" id="logout-btn">Log out</button>
    </header>
    <main>
      <div class="tabs" id="tabs"></div>
      <div class="panel">
        <div class="panel-head"><h2 id="panel-title">Projects</h2><span class="count" id="panel-count"></span></div>
        <div class="table-scroll"><div id="content" class="loading">Loading…</div></div>
      </div>
    </main>
  </div>

  <script>
    // Same-origin: nginx on this box reverse-proxies /api and /health to the
    // ECS API tasks, so no CORS and no hardcoded backend address.
    const API = "";
    const RESOURCES = [
      { key: "projects", label: "Projects", path: "/api/v1/projects" },
      { key: "tasks",    label: "Tasks",    path: "/api/v1/tasks" },
      { key: "teams",    label: "Teams",    path: "/api/v1/teams" },
      { key: "users",    label: "Users",    path: "/api/v1/users" },
    ];

    const state = { token: localStorage.getItem("ed_token") || null, user: null, active: "projects", healthTimer: null };

    const $ = (id) => document.getElementById(id);

    function authHeaders() {
      return state.token ? { Authorization: "Bearer " + state.token } : {};
    }

    async function login(username, password) {
      const res = await fetch(API + "/api/v1/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || ("Login failed (" + res.status + ")"));
      state.token = data.access_token;
      state.user = data.user;
      localStorage.setItem("ed_token", state.token);
      return data;
    }

    function logout() {
      state.token = null; state.user = null;
      if (state.healthTimer) { clearTimeout(state.healthTimer); state.healthTimer = null; }
      localStorage.removeItem("ed_token");
      showLogin();
    }

    function showLogin() {
      $("app").classList.add("hidden");
      $("login").classList.remove("hidden");
      $("login-msg").textContent = "";
      $("password").value = "";
    }

    function showApp() {
      $("login").classList.add("hidden");
      $("app").classList.remove("hidden");
      renderWhoami();
      renderTabs();
      if (state.healthTimer) clearTimeout(state.healthTimer); // avoid duplicate poll loops
      pollHealth();
      loadActive();
    }

    function renderWhoami() {
      const u = state.user;
      if (!u) { $("whoami").textContent = ""; return; }
      const role = u.role ? '<span class="role">' + esc(u.role) + '</span>' : "";
      $("whoami").innerHTML = "Signed in as <b>" + esc(u.username || "user") + "</b>" + role;
    }

    function renderTabs() {
      $("tabs").innerHTML = "";
      RESOURCES.forEach((r) => {
        const el = document.createElement("button");
        el.type = "button";
        el.className = "tab" + (r.key === state.active ? " active" : "");
        el.textContent = r.label;
        el.setAttribute("aria-pressed", r.key === state.active ? "true" : "false");
        el.onclick = () => { state.active = r.key; renderTabs(); loadActive(); };
        $("tabs").appendChild(el);
      });
    }

    async function loadActive() {
      const r = RESOURCES.find((x) => x.key === state.active);
      $("panel-title").textContent = r.label;
      $("panel-count").textContent = "";
      $("content").className = "loading";
      $("content").textContent = "Loading…";
      try {
        const res = await fetch(API + r.path, { headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || ("Request failed (" + res.status + ")"));
        const items = data[r.key] || [];
        if (typeof data.total === "number") $("panel-count").textContent = data.total + " total";
        renderTable(items);
      } catch (e) {
        $("content").className = "empty";
        $("content").textContent = "⚠ " + e.message;
      }
    }

    function renderTable(items) {
      const box = $("content");
      if (!items.length) { box.className = "empty"; box.textContent = "No records."; return; }
      // Union of keys across rows, skipping obviously nested/noisy fields.
      const cols = [];
      items.forEach((it) => Object.keys(it).forEach((k) => { if (!cols.includes(k)) cols.push(k); }));
      const show = cols.filter((c) => !["description"].includes(c)).slice(0, 8);
      let html = "<table><thead><tr>";
      show.forEach((c) => (html += "<th>" + esc(c.replace(/_/g, " ")) + "</th>"));
      html += "</tr></thead><tbody>";
      items.forEach((it) => {
        html += "<tr>";
        show.forEach((c) => (html += "<td>" + cell(it[c], c) + "</td>"));
        html += "</tr>";
      });
      html += "</tbody></table>";
      box.className = "";
      box.innerHTML = html;
    }

    function cell(v, key) {
      if (v === null || v === undefined) return '<span style="color:var(--muted)">—</span>';
      if (typeof v === "object") return esc(JSON.stringify(v));
      if (["status", "priority", "role"].includes(key)) return '<span class="pill">' + esc(String(v)) + "</span>";
      return esc(String(v));
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    async function pollHealth() {
      if (!state.token) return; // session ended — stop the recursive timer
      const badge = $("health"), text = $("health-text");
      try {
        const res = await fetch(API + "/health", { headers: authHeaders() });
        if (res.ok) { badge.className = "health ok"; text.textContent = "API healthy"; }
        else { badge.className = "health bad"; text.textContent = "API degraded"; }
      } catch {
        badge.className = "health bad"; text.textContent = "API unreachable";
      }
      state.healthTimer = setTimeout(pollHealth, 15000);
    }

    // ── Wire up ──
    $("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = $("login-btn"), msg = $("login-msg");
      msg.className = "msg"; msg.textContent = "";
      btn.disabled = true; btn.textContent = "Signing in…";
      try {
        await login($("username").value.trim(), $("password").value);
        showApp();
      } catch (err) {
        msg.className = "msg err"; msg.textContent = err.message;
      } finally {
        btn.disabled = false; btn.textContent = "Sign in";
      }
    });
    $("logout-btn").addEventListener("click", logout);

    // Resume a stored session if the token still works; else show login.
    (async function boot() {
      if (!state.token) { showLogin(); return; }
      try {
        const res = await fetch(API + "/api/v1/auth/me", { headers: authHeaders() });
        if (!res.ok) throw new Error("expired");
        state.user = await res.json();
        showApp();
      } catch {
        logout();
      }
    })();
  </script>
</body>
</html>
