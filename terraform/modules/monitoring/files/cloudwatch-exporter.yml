apiVersion: v1alpha1
discovery:
  exportedTagsOnMetrics:
    AWS/ECS:
      - ClusterName
      - ServiceName
    AWS/RDS:
      - DBInstanceIdentifier
    AWS/ElastiCache:
      - CacheClusterId
  jobs:
    - regions:
        - NEXUSDEPLOY_REGION
      type: AWS/ECS
      period: 300
      length: 300
      metrics:
        - name: CPUUtilization
          statistics: [Average]
          nilToZero: true
        - name: MemoryUtilization
          statistics: [Average]
          nilToZero: true
      searchTags:
        - key: Project
          value: NEXUSDEPLOY_PROJECT

    - regions:
        - NEXUSDEPLOY_REGION
      type: AWS/RDS
      period: 300
      length: 300
      metrics:
        - name: CPUUtilization
          statistics: [Average]
          nilToZero: true
        - name: DatabaseConnections
          statistics: [Average]
          nilToZero: true
        - name: FreeStorageSpace
          statistics: [Average]
          nilToZero: true
      searchTags:
        - key: Project
          value: NEXUSDEPLOY_PROJECT

    - regions:
        - NEXUSDEPLOY_REGION
      type: AWS/ElastiCache
      period: 300
      length: 300
      metrics:
        - name: DatabaseMemoryUsagePercentage
          statistics: [Average]
          nilToZero: true
        - name: CurrConnections
          statistics: [Average]
          nilToZero: true
      searchTags:
        - key: Project
          value: NEXUSDEPLOY_PROJECT
