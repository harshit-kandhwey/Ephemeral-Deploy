apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"

  - name: CloudWatch
    type: cloudwatch
    access: proxy
    jsonData:
      authType: ec2_iam_role
      defaultRegion: NEXUSDEPLOY_REGION
      logsTimeout: "30s"
