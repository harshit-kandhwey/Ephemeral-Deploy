name: Deploy

on:
  # Triggered explicitly by ci.yml on successful push to dev/main.
  # This replaces the workflow_run trigger which was unreliable.
  # Chain: push → ci.yml passes → dispatches deploy.yml → deploy dispatches cleanup.yml
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Action"
        required: true
        type: choice
        options: [plan, apply]
        default: apply
      app_changed:
        description: "Whether app code changed (passed from CI)"
        required: false
        default: "false" # default false — CI passes the real value; manual triggers skip build if images exist

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  actions: write # needed to dispatch cleanup.yml
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  TF_STATE_BUCKET: nexusdeploy-terraform-state
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_LOCK_TABLE: nexusdeploy-terraform-locks

jobs:
  # ─────────────────────────────────────────────
  # Determine context
  # ─────────────────────────────────────────────
  setup:
    name: Setup Context
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      id-token: write # needed for AWS credentials on infra-only image lookup
      contents: read

    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      tf_action: ${{ steps.ctx.outputs.tf_action }}
      image_tag: ${{ github.sha }}
      app_changed: ${{ steps.changed.outputs.app_changed }}
      current_api: ${{ steps.current_images.outputs.api_image }}
      current_worker: ${{ steps.current_images.outputs.worker_image }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: Setup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2 # needed for git diff HEAD~1 HEAD in changed-files detection

      - name: Determine context
        id: ctx
        run: |
          # deploy.yml is only triggered via workflow_dispatch
          # (either from ci.yml on push, or manually)
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          echo "tf_action=${{ github.event.inputs.action }}"        >> $GITHUB_OUTPUT
          echo "📦 Environment: ${{ github.event.inputs.environment }}"
          echo "⚙️  Action:      ${{ github.event.inputs.action }}"

      - name: Detect changed files
        id: changed
        run: |
          # Decision logic:
          #   app_changed=true  → build image
          #   app_changed=false → check ECR
          #     ECR empty       → build image
          #     ECR has images  → skip build
          APP_CHANGED="${{ github.event.inputs.app_changed }}"
          ENV="${{ github.event.inputs.environment }}"

          if [[ -z "$APP_CHANGED" || "$APP_CHANGED" == "true" ]]; then
            # App code changed or manual trigger — always build
            echo "app_changed=true" >> $GITHUB_OUTPUT
            echo "🔨 App changed — image build required"
          else
            # No app change — check if ECR has any images
            IMAGE_COUNT=$(aws ecr describe-images \
              --repository-name "nexusdeploy-api-$ENV" \
              --region ${{ env.AWS_REGION }} \
              --query 'length(imageDetails)' \
              --output text 2>/dev/null || echo "0")

            if [[ "$IMAGE_COUNT" == "0" || -z "$IMAGE_COUNT" ]]; then
              echo "app_changed=true" >> $GITHUB_OUTPUT
              echo "⚠️  ECR empty — forcing build despite no app code change"
            else
              echo "app_changed=false" >> $GITHUB_OUTPUT
              echo "⏭️  No app changes + images exist in ECR — skipping build"
            fi
          fi

      - name: Get current image URIs (infra-only deploy)
        id: current_images
        # Only runs when app unchanged AND ECR has images (detect step guarantees this).
        # Simply fetches the most recently pushed image URI for Terraform to use.
        if: steps.changed.outputs.app_changed == 'false'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ENV="${{ github.event.inputs.environment }}"

          API_TAGS=$(aws ecr describe-images \
            --repository-name "nexusdeploy-api-$ENV" \
            --region ${{ env.AWS_REGION }} \
            --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags' \
            --output text 2>/dev/null || echo "latest")
          API_IMAGE=$(echo "$API_TAGS" | tr $'\t' $'\n' | grep -v '^latest$' | head -1)
          API_IMAGE="${API_IMAGE:-latest}"

          WORKER_TAGS=$(aws ecr describe-images \
            --repository-name "nexusdeploy-worker-$ENV" \
            --region ${{ env.AWS_REGION }} \
            --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags' \
            --output text 2>/dev/null || echo "latest")
          WORKER_IMAGE=$(echo "$WORKER_TAGS" | tr $'\t' $'\n' | grep -v '^latest$' | head -1)
          WORKER_IMAGE="${WORKER_IMAGE:-latest}"

          echo "api_image=$REGISTRY/nexusdeploy-api-$ENV:$API_IMAGE"       >> $GITHUB_OUTPUT
          echo "worker_image=$REGISTRY/nexusdeploy-worker-$ENV:$WORKER_IMAGE" >> $GITHUB_OUTPUT
          echo "ℹ️  Using existing images: api=$API_IMAGE worker=$WORKER_IMAGE"

  # ─────────────────────────────────────────────
  # Phase 1a: Provision ECR repositories
  # Runs in parallel with image build.
  # Must complete before images can be pushed.
  # ─────────────────────────────────────────────
  ecr-provision:
    name: Provision ECR (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: setup
    # Always runs — ecr-check step inside skips terraform apply if repos already exist.
    # This ensures repos are created even on infra-only pushes where repos may be missing.
    if: always() && needs.setup.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}

    permissions:
      id-token: write
      contents: read

    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: ECRProvision-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ needs.setup.outputs.environment }}
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ needs.setup.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Check if ECR repositories already exist
        id: ecr-check
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          API_EXISTS=$(aws ecr describe-repositories \
            --repository-names "nexusdeploy-api-$ENV" \
            --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryName' \
            --output text 2>/dev/null || echo "")
          WORKER_EXISTS=$(aws ecr describe-repositories \
            --repository-names "nexusdeploy-worker-$ENV" \
            --region ${{ env.AWS_REGION }} \
            --query 'repositories[0].repositoryName' \
            --output text 2>/dev/null || echo "")

          if [[ -n "$API_EXISTS" && -n "$WORKER_EXISTS" ]]; then
            echo "repos_exist=true" >> $GITHUB_OUTPUT
            echo "ℹ️  ECR repos already exist — skipping terraform apply"
            echo "registry=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT
          else
            echo "repos_exist=false" >> $GITHUB_OUTPUT
            echo "🏗️  ECR repos missing — will provision via Terraform"
          fi

      - name: Terraform Apply — ECR only
        # Only runs when repos don't exist yet (first deploy or after full teardown).
        # Skipped when repos already exist — avoids redundant Terraform runs.
        if: steps.ecr-check.outputs.repos_exist == 'false'
        timeout-minutes: 30
        working-directory: terraform/environments/${{ needs.setup.outputs.environment }}
        env:
          TF_VAR_api_image: "placeholder"
          TF_VAR_worker_image: "placeholder"
          TF_VAR_git_commit: ${{ github.sha }}
          # Required by staging/prod (no default in variables.tf); silently ignored by dev.
          # Even with -target=module.ecr, Terraform evaluates the whole config.
          TF_VAR_monitoring_allowed_cidr: "[]"
        run: |
          terraform apply \
            -input=false \
            -target=module.ecr \
            -var-file=terraform.tfvars \
            -auto-approve
          echo "✅ ECR repositories provisioned"

      - name: Ensure ECR lifecycle policies exist
        # Lifecycle policies may have been deleted manually or by a failed cleanup.
        # Create them via AWS CLI if missing — idempotent, safe to run every time.
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          REGION="${{ env.AWS_REGION }}"

          for repo in nexusdeploy-api-$ENV nexusdeploy-worker-$ENV; do
            if ! aws ecr get-lifecycle-policy \
                --repository-name "$repo" \
                --region "$REGION" 2>/dev/null; then
              echo "⚠️  Lifecycle policy missing for $repo — creating..."
              aws ecr put-lifecycle-policy \
                --repository-name "$repo" \
                --region "$REGION" \
                --lifecycle-policy-text '{"rules":[{"rulePriority":1,"description":"Keep last 3 tagged images","selection":{"tagStatus":"tagged","tagPrefixList":["v","sha"],"countType":"imageCountMoreThan","countNumber":3},"action":{"type":"expire"}},{"rulePriority":2,"description":"Delete untagged images after 1 day","selection":{"tagStatus":"untagged","countType":"sinceImagePushed","countUnit":"days","countNumber":1},"action":{"type":"expire"}}]}'
              echo "✅ Lifecycle policy created for $repo"
            else
              echo "✅ Lifecycle policy already exists for $repo"
            fi
          done

      - name: Set ECR registry output
        id: ecr-registry
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT
          echo "✅ ECR repositories ready"

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

  # Phase 1b removed — build-image was redundant.
  # push-image builds and pushes in one step using GHA cache.

  # ─────────────────────────────────────────────
  # Phase 2: Push images to ECR
  # Waits for BOTH ECR to exist AND images to be built.
  # ECR repos guaranteed to exist at this point.
  # ─────────────────────────────────────────────
  push-image:
    name: Push Images (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [setup, ecr-provision]
    concurrency:
      group: push-image-${{ github.ref_name }}
      cancel-in-progress: true
    if: |
      always() &&
      needs.setup.outputs.app_changed == 'true' &&
      needs.ecr-provision.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      id-token: write
      contents: read

    outputs:
      api_image: ${{ steps.push.outputs.api_image }}
      worker_image: ${{ steps.push.outputs.worker_image }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: PushImages-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build and push API image
        id: push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ENV: ${{ needs.setup.outputs.environment }}
          TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            --build-arg GIT_COMMIT=$TAG \
            --tag $REGISTRY/nexusdeploy-api-$ENV:$TAG \
            --tag $REGISTRY/nexusdeploy-api-$ENV:latest \
            --push ./app

          docker buildx build \
            --platform linux/amd64 \
            --file ./app/Dockerfile.worker \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            --tag $REGISTRY/nexusdeploy-worker-$ENV:$TAG \
            --tag $REGISTRY/nexusdeploy-worker-$ENV:latest \
            --push ./app

          echo "api_image=$REGISTRY/nexusdeploy-api-$ENV:$TAG"       >> $GITHUB_OUTPUT
          echo "worker_image=$REGISTRY/nexusdeploy-worker-$ENV:$TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # DEV DEPLOYMENT (branch: dev)
  # Straightforward: plan → apply → schedule cleanup
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [setup, ecr-provision, push-image]
    concurrency:
      group: deploy-dev-${{ github.ref_name }}
      cancel-in-progress: false
    # Run when: env is dev AND (image was pushed OR only infra changed)
    if: |
      always() &&
      needs.setup.outputs.environment == 'dev' &&
      needs.setup.outputs.tf_action == 'apply' &&
      (needs.ecr-provision.result == 'success' || needs.ecr-provision.result == 'skipped') &&
      (needs.push-image.result == 'success' || needs.setup.outputs.app_changed == 'false')
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: DeployDev-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Delete orphaned resources (prevents EntityAlreadyExists / ResourceAlreadyExistsException)
        # Some resources survive failed cleanups but aren't in Terraform state.
        # Terraform cannot create them if they already exist — delete them so
        # Terraform creates fresh. Import blocks handle resources that ALWAYS survive.
        continue-on-error: true
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          REGION="${{ env.AWS_REGION }}"
          PROJECT="nexusdeploy"

          # ── CloudWatch Log Groups ──────────────────────────────────────────
          for lg in \
            "/ecs/$PROJECT/$ENV/api" \
            "/ecs/$PROJECT/$ENV/worker" \
            "/ecs/$PROJECT/$ENV/beat" \
            "/aws/vpc/flowlogs/$PROJECT-$ENV"; do
            if aws logs describe-log-groups \
                --log-group-name-prefix "$lg" --region "$REGION" \
                --query 'logGroups[0].logGroupName' --output text 2>/dev/null | grep -q "$lg"; then
              echo "🗑️  Deleting orphaned log group: $lg"
              aws logs delete-log-group --log-group-name "$lg" --region "$REGION" 2>/dev/null || true
            fi
          done

          # ── Secrets Manager ───────────────────────────────────────────────
          # Secrets may be in pending-deletion state from a previous failed cleanup.
          for secret_id in "$PROJECT/$ENV/app-secrets" "$PROJECT/$ENV/init-secrets" "$PROJECT/$ENV/seed-secrets"; do
            SECRET_STATE=$(aws secretsmanager describe-secret \
              --secret-id "$secret_id" --region "$REGION" \
              --query 'DeletedDate' --output text 2>/dev/null || echo "NOT_FOUND")
            if [[ "$SECRET_STATE" != "NOT_FOUND" && "$SECRET_STATE" != "None" ]]; then
              echo "🗑️  Force-deleting secret pending deletion: $secret_id"
              aws secretsmanager delete-secret \
                --secret-id "$secret_id" \
                --force-delete-without-recovery \
                --region "$REGION" 2>/dev/null || true
            fi
          done

          # ── Monitoring IAM role + instance profile ────────────────────────
          # monitoring module creates these internally but they survive cleanup
          # because module.monitoring is targeted in destroy. Delete so Terraform
          # can recreate them fresh on next deploy.
          # ── Monitoring IAM role + instance profile ────────────────────────
          MONITORING_ROLE="$PROJECT-$ENV-monitoring-ec2"
          MONITORING_PROFILE="$PROJECT-$ENV-monitoring"

          if aws iam get-instance-profile               --instance-profile-name "$MONITORING_PROFILE" 2>/dev/null; then
            aws iam remove-role-from-instance-profile               --instance-profile-name "$MONITORING_PROFILE"               --role-name "$MONITORING_ROLE" 2>/dev/null || true
            aws iam delete-instance-profile               --instance-profile-name "$MONITORING_PROFILE" 2>/dev/null || true
            echo "🗑️  Deleted orphaned monitoring instance profile"
          fi
          if aws iam get-role               --role-name "$MONITORING_ROLE" 2>/dev/null; then
            POLICIES=$(aws iam list-attached-role-policies               --role-name "$MONITORING_ROLE"               --query 'AttachedPolicies[*].PolicyArn' --output text 2>/dev/null || echo "")
            for policy in $POLICIES; do
              aws iam detach-role-policy                 --role-name "$MONITORING_ROLE"                 --policy-arn "$policy" 2>/dev/null || true
            done
            INLINE=$(aws iam list-role-policies               --role-name "$MONITORING_ROLE"               --query 'PolicyNames[*]' --output text 2>/dev/null || echo "")
            for policy in $INLINE; do
              aws iam delete-role-policy                 --role-name "$MONITORING_ROLE"                 --policy-name "$policy" 2>/dev/null || true
            done
            aws iam delete-role               --role-name "$MONITORING_ROLE" 2>/dev/null || true
            echo "🗑️  Deleted orphaned monitoring IAM role"
          fi

          echo "✅ Orphaned resource cleanup complete"

      - name: Adopt orphaned Terraform resources
        # If a previous deploy failed mid-way and cleanup didn't run, AWS
        # resources can exist without being in Terraform state. The next apply
        # then fails with "already exists". This step imports each resource only
        # when it exists in AWS but is absent from state — both "not in AWS" and
        # "already in state" cases are silenced with || true so a clean first
        # deploy or a replay of a successful one both pass without errors.
        # TF_VAR_* placeholders are required so Terraform can parse the config
        # during import (these vars have no defaults in the module).
        working-directory: terraform/environments/dev
        env:
          TF_VAR_api_image: "placeholder"
          TF_VAR_worker_image: "placeholder"
          TF_VAR_git_commit: "placeholder"
        run: |
          adopt() {
            local addr=$1 id=$2
            terraform state show "$addr" &>/dev/null && return 0
            terraform import -var-file=terraform.tfvars "$addr" "$id" || true
          }

          # No-op while dev keeps recovery_window_in_days = 0, but keeps the
          # three environments symmetrical if that window is ever raised.
          restore_secret() {
            local id=$1 deleted
            deleted=$(aws secretsmanager describe-secret --secret-id "$id" \
              --query 'DeletedDate' --output text 2>/dev/null) || return 0
            [[ -z "$deleted" || "$deleted" == "None" ]] && return 0
            echo "Restoring secret scheduled for deletion: $id"
            aws secretsmanager restore-secret --secret-id "$id" >/dev/null || true
          }
          restore_secret "nexusdeploy/dev/app-secrets"
          restore_secret "nexusdeploy/dev/init-secrets"
          restore_secret "nexusdeploy/dev/seed-secrets"

          adopt aws_secretsmanager_secret.app                   "nexusdeploy/dev/app-secrets"
          adopt aws_secretsmanager_secret.init                  "nexusdeploy/dev/init-secrets"
          adopt aws_secretsmanager_secret.seed                  "nexusdeploy/dev/seed-secrets"
          adopt module.iam.aws_iam_role.ecs_execution           "nexusdeploy-dev-ecs-execution"
          adopt module.iam.aws_iam_role.ecs_execution_worker    "nexusdeploy-dev-ecs-execution-worker"
          adopt module.iam.aws_iam_role.ecs_task                "nexusdeploy-dev-ecs-task"
          adopt module.iam.aws_iam_role.vpc_flow_log            "nexusdeploy-dev-vpc-flow-log"
          adopt module.ecr.aws_ecr_repository.api               "nexusdeploy-api-dev"
          adopt module.ecr.aws_ecr_repository.worker            "nexusdeploy-worker-dev"

      - name: Terraform Apply — full infrastructure
        timeout-minutes: 30
        working-directory: terraform/environments/dev
        env:
          TF_VAR_api_image: ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.api_image || needs.setup.outputs.current_api }}
          TF_VAR_worker_image: ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.worker_image || needs.setup.outputs.current_worker }}
          TF_VAR_git_commit: ${{ github.sha }}
        run: terraform apply -input=false -var-file=terraform.tfvars -auto-approve

      - name: Run database init (ECS one-off task inside VPC)
        # Runs init_db.py as ECS task inside VPC — can reach private RDS.
        # Creates NexusAppUser + schema. Idempotent — safe on every deploy.
        # continue-on-error: init_db failure should not block deployment.
        continue-on-error: true
        working-directory: terraform/environments/dev
        run: |
          SECRET_ARN=$(terraform output -raw app_secret_arn 2>/dev/null | grep -v '│' | tail -1 || echo "")
          CLUSTER=$(terraform output -raw ecs_cluster_name 2>/dev/null | grep -v '│' | tail -1 || echo "nexusdeploy-dev")
          SUBNET_ID=$(terraform output -json private_app_subnet_ids 2>/dev/null | python3 -c "import sys,json; ids=json.load(sys.stdin); print(ids[0])" || echo "")
          SG_ID=$(terraform output -raw worker_sg_id 2>/dev/null | grep -v '│' | tail -1 || echo "")

          if [[ -z "$SECRET_ARN" || -z "$SUBNET_ID" || -z "$SG_ID" ]]; then
            echo "⚠️  Missing Terraform outputs — skipping init_db"
            exit 0
          fi

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition nexusdeploy-dev-worker \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          OVERRIDES='{"containerOverrides":[{"name":"worker","command":["python","-m","src.init_db"],"environment":[{"name":"ENV","value":"development"},{"name":"SEED_DB","value":"true"}]}]}'

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_ID],securityGroups=[$SG_ID],assignPublicIp=DISABLED}" \
            --overrides "$OVERRIDES" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' --output text)

          echo "Task ARN: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }}

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [[ "$EXIT_CODE" == "0" ]]; then
            echo "✅ Database initialized successfully"
          else
            echo "⚠️  init_db exited with code: $EXIT_CODE — check logs"
          fi

      - name: Verify service health (dev)
        id: health
        # Dev is single-slot, so there is no promotion to gate — this is a light
        # post-deploy check that surfaces a broken deploy in the logs. Especially
        # useful when validating infra changes here (e.g. Redis/ElastiCache): if
        # the API cannot reach its dependencies, /health fails and the tasks
        # never reach HEALTHY.
        #
        # Deliberately still non-blocking: a failed deploy job triggers the
        # immediate cleanup-on-failure teardown, which would destroy the very
        # environment you need in order to debug. It reports loudly instead —
        # see the summary step, which now renders a per-service status row.
        #
        # Worker and beat are checked too. They were not, and that hid a real
        # bug: beat crash-looped on boot (it could not write celerybeat-schedule
        # into the root-owned /app) until the circuit breaker retired it, while
        # the deploy still reported success because only the API was inspected.
        # Neither defines a container health check, so they can only be gated on
        # runningCount == desiredCount — but that is enough to catch a service
        # that never starts.
        continue-on-error: true
        run: |
          CLUSTER="nexusdeploy-dev"
          SERVICE="nexusdeploy-dev-api"
          MAX_WAIT=240
          INTERVAL=30
          ELAPSED=0
          API_OK=false

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            ARNS=$(aws ecs list-tasks --cluster $CLUSTER --service-name $SERVICE --desired-status RUNNING \
              --region ${{ env.AWS_REGION }} --query 'taskArns' --output text 2>/dev/null || echo "")
            HEALTH="none"
            if [[ -n "$ARNS" && "$ARNS" != "None" ]]; then
              HEALTH=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $ARNS \
                --region ${{ env.AWS_REGION }} --query 'tasks[].healthStatus' --output text 2>/dev/null || echo "none")
            fi
            echo "  API task health: $HEALTH (${ELAPSED}s elapsed)"
            if [[ "$HEALTH" != "none" && "$HEALTH" != *UNHEALTHY* && "$HEALTH" != *UNKNOWN* ]]; then
              echo "✅ Dev API is HEALTHY"
              API_OK=true
              break
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          [[ "$API_OK" == "true" ]] || echo "⚠️  Dev API did not reach HEALTHY within ${MAX_WAIT}s — check CloudWatch logs"

          # Sidecars: runningCount vs desiredCount, plus the rollout state, which
          # is what actually names the failure ("circuit breaker: tasks failed to
          # start") when a container exits on boot.
          SIDECARS_OK=true
          STATUS_ROWS=""
          for svc in worker beat; do
            read -r S_RUN S_DES S_ROLL < <(aws ecs describe-services \
              --cluster "$CLUSTER" --services "nexusdeploy-dev-$svc" \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].[runningCount,desiredCount,deployments[0].rolloutState]' \
              --output text 2>/dev/null || echo "0 1 UNKNOWN")
            echo "  $svc: ${S_RUN:-0}/${S_DES:-1} rollout=${S_ROLL:-UNKNOWN}"
            if [[ "$S_RUN" =~ ^[0-9]+$ && "$S_RUN" == "$S_DES" && "$S_RUN" != "0" ]]; then
              STATUS_ROWS="$STATUS_ROWS|$svc|✅ ${S_RUN}/${S_DES}|"$'\n'
            else
              SIDECARS_OK=false
              STATUS_ROWS="$STATUS_ROWS|$svc|❌ ${S_RUN:-0}/${S_DES:-1} (rollout: ${S_ROLL:-UNKNOWN})|"$'\n'
              echo "::warning::dev $svc is not running (${S_RUN:-0}/${S_DES:-1}, rollout ${S_ROLL:-UNKNOWN}) — check /ecs/nexusdeploy/dev/$svc logs"
            fi
          done

          {
            echo "api_ok=$API_OK"
            echo "sidecars_ok=$SIDECARS_OK"
            echo "api_row=|api|$([[ "$API_OK" == "true" ]] && echo "✅ HEALTHY" || echo "❌ not healthy")|"
          } >> $GITHUB_OUTPUT
          {
            echo "status_rows<<STATUS_EOF"
            printf '%s' "$STATUS_ROWS"
            echo "STATUS_EOF"
          } >> $GITHUB_OUTPUT

      - name: Get outputs
        id: outputs
        continue-on-error: true # Non-blocking — URLs are informational only
        working-directory: terraform/environments/dev
        run: |
          GRAFANA_URL=$(terraform output -raw grafana_url 2>/dev/null | grep -v '│' | tail -1) || true
          PROMETHEUS_URL=$(terraform output -raw prometheus_url 2>/dev/null | grep -v '│' | tail -1) || true
          echo "grafana_url=${GRAFANA_URL:-deploying...}"       >> $GITHUB_OUTPUT
          echo "prometheus_url=${PROMETHEUS_URL:-deploying...}" >> $GITHUB_OUTPUT

      - name: Deployment summary
        continue-on-error: true # Non-blocking — summary failure should not fail the deploy
        run: |
          # "Complete" is not the same as "working". Terraform applying cleanly
          # while a service never starts is exactly what happened with beat, so
          # the heading reflects the observed service state, not just the apply.
          if [[ "${{ steps.health.outputs.api_ok }}" == "true" \
                && "${{ steps.health.outputs.sidecars_ok }}" == "true" ]]; then
            echo "## ✅ Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Dev Deployment Complete — but services are DEGRADED" >> $GITHUB_STEP_SUMMARY
            echo "Terraform applied, but not every service came up. Dev is non-blocking by design (a hard failure would trigger the immediate teardown and destroy the evidence), so the deploy is green — the table below is the real status." >> $GITHUB_STEP_SUMMARY
          fi
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.health.outputs.api_row }}" >> $GITHUB_STEP_SUMMARY
          printf '%s\n' "${{ steps.health.outputs.status_rows }}" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | ${{ steps.outputs.outputs.grafana_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | ${{ steps.outputs.outputs.prometheus_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Auto-destroy in | 45 minutes |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # POST-DEPLOY: Success → cleanup after 45 min TTL
  # ─────────────────────────────────────────────
  cleanup-on-success:
    name: Schedule cleanup (45 min TTL)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, deploy-dev]
    if: |
      always() &&
      needs.setup.outputs.environment == 'dev' &&
      needs.deploy-dev.result == 'success'

    permissions:
      actions: write

    steps:
      - name: Trigger cleanup after 45 minutes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'cleanup.yml',
                ref: context.ref,
                inputs: {
                  environment: 'dev',
                  delay_minutes: '45',
                  reason: 'Auto-cleanup: dev TTL (45 min) expired'
                }
              });
              console.log('⏳ Cleanup scheduled in 45 minutes');
            } catch (err) {
              if (err.status === 422) {
                console.warn('⚠️  cleanup.yml is disabled — skipping auto-cleanup. Enable it in GitHub → Actions to restore auto-cleanup.');
              } else {
                throw err;
              }
            }

  # ─────────────────────────────────────────────
  # POST-DEPLOY: Failure → cleanup immediately
  # ─────────────────────────────────────────────
  cleanup-on-failure:
    name: Cleanup on failure (immediate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, deploy-dev]
    if: |
      always() &&
      needs.setup.outputs.environment == 'dev' &&
      needs.deploy-dev.result == 'failure'

    permissions:
      actions: write

    steps:
      - name: Trigger immediate cleanup
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'cleanup.yml',
                ref: context.ref,
                inputs: {
                  environment: 'dev',
                  delay_minutes: '0',
                  reason: 'Auto-cleanup: deploy failed — removing partial infrastructure'
                }
              });
              console.log('🔥 Immediate cleanup triggered due to deploy failure');
            } catch (err) {
              if (err.status === 422) {
                console.warn('⚠️  cleanup.yml is disabled — skipping auto-cleanup. Enable it in GitHub → Actions to restore auto-cleanup.');
              } else {
                throw err;
              }
            }

  # ─────────────────────────────────────────────
  # STAGING & PROD — Blue-Green (reusable workflow)
  #
  # The full slot-rotation flow lives in deploy-blue-green.yml; these two callers
  # differ only by environment, drain timing/ref, and whether init_db runs. The
  # resolved image inputs use the same fallback as dev — the freshly pushed image
  # on an app change, otherwise the image already running (infra-only deploy).
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging (blue-green)
    needs: [setup, ecr-provision, push-image]
    if: |
      always() &&
      needs.setup.outputs.environment == 'staging' &&
      needs.setup.outputs.tf_action == 'apply' &&
      (needs.ecr-provision.result == 'success' || needs.ecr-provision.result == 'skipped') &&
      (needs.push-image.result == 'success' || needs.setup.outputs.app_changed == 'false')
    permissions:
      id-token: write
      contents: read
      actions: write
    uses: ./.github/workflows/deploy-blue-green.yml
    secrets: inherit
    with:
      environment: staging
      drain_minutes: "120"
      drain_ref: staging
      drain_label: 2h
      run_init_db: true
      app_changed: ${{ needs.setup.outputs.app_changed }}
      api_image: ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.api_image || needs.setup.outputs.current_api }}
      worker_image: ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.worker_image || needs.setup.outputs.current_worker }}

  deploy-prod:
    name: Deploy → prod (blue-green)
    needs: [setup, ecr-provision, push-image]
    if: |
      always() &&
      needs.setup.outputs.environment == 'prod' &&
      needs.setup.outputs.tf_action == 'apply' &&
      (needs.ecr-provision.result == 'success' || needs.ecr-provision.result == 'skipped') &&
      (needs.push-image.result == 'success' || needs.setup.outputs.app_changed == 'false')
    # Manual-approval gate: the prod GitHub Environment's protection rules apply
    # because deploy-blue-green.yml's job sets environment: prod.
    permissions:
      id-token: write
      contents: read
      actions: write
    uses: ./.github/workflows/deploy-blue-green.yml
    secrets: inherit
    with:
      environment: prod
      drain_minutes: "1440"
      drain_ref: main
      drain_label: 24h
      run_init_db: false
      app_changed: ${{ needs.setup.outputs.app_changed }}
      api_image: ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.api_image || needs.setup.outputs.current_api }}
      worker_image: ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.worker_image || needs.setup.outputs.current_worker }}
