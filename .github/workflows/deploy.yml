name: Deploy

on:
  # Triggered explicitly by ci.yml on successful push to dev/main.
  # This replaces the workflow_run trigger which was unreliable.
  # Chain: push → ci.yml passes → dispatches deploy.yml → deploy dispatches cleanup.yml
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [ dev, prod ]
      action:
        description: 'Action'
        required: true
        type: choice
        options: [ plan, apply ]
        default: apply

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  actions: write   # needed to dispatch cleanup.yml
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  TF_STATE_BUCKET: nexusdeploy-terraform-state
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # DynamoDB locking - commented intentionally (single-dev, no concurrency risk)
  # TF_LOCK_TABLE: nexusdeploy-terraform-locks

jobs:
  # ─────────────────────────────────────────────
  # Determine context
  # ─────────────────────────────────────────────
  setup:
    name: Setup Context
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      id-token: write   # needed for AWS credentials on infra-only image lookup
      contents: read

    outputs:
      environment:    ${{ steps.ctx.outputs.environment }}
      tf_action:      ${{ steps.ctx.outputs.tf_action }}
      image_tag:      ${{ github.sha }}
      app_changed:    ${{ steps.changed.outputs.app_changed }}
      current_api:    ${{ steps.current_images.outputs.api_image }}
      current_worker: ${{ steps.current_images.outputs.worker_image }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: Setup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # needed for git diff HEAD~1 HEAD in changed-files detection

      - name: Determine context
        id: ctx
        run: |
          # deploy.yml is only triggered via workflow_dispatch
          # (either from ci.yml on push, or manually)
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          echo "tf_action=${{ github.event.inputs.action }}"        >> $GITHUB_OUTPUT
          echo "📦 Environment: ${{ github.event.inputs.environment }}"
          echo "⚙️  Action:      ${{ github.event.inputs.action }}"

      - name: Detect changed files
        id: changed
        run: |
          # Get list of changed files — fetch-depth: 2 ensures HEAD~1 is available
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "app/")

          echo "Changed files:"
          echo "$CHANGED"

          # Check if any app/ files changed
          if echo "$CHANGED" | grep -q "^app/"; then
            echo "app_changed=true" >> $GITHUB_OUTPUT
            echo "✅ App code changed — image build required"
          else
            echo "app_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  No app code changes — skipping image build"
          fi

      - name: Get current image URIs (infra-only deploy)
        id: current_images
        # When app hasn't changed, look up the currently deployed image from ECR
        # so Terraform apply gets the real image URI not an empty string
        if: steps.changed.outputs.app_changed == 'false'
        env:
          ENV: ${{ github.event.inputs.environment }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ENV="${{ github.event.inputs.environment }}"

          # Get the latest image digest currently in ECR
          # Prefer SHA-tagged image over 'latest' — imageTags[0] order is not guaranteed
          API_TAGS=$(aws ecr describe-images             --repository-name "nexusdeploy-api-$ENV"             --region ${{ env.AWS_REGION }}             --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags'             --output text 2>/dev/null || echo "latest")
          API_IMAGE=$(echo "$API_TAGS" | tr $'\t' $'\n' | grep -v '^latest$' | head -1)
          API_IMAGE="${API_IMAGE:-latest}"

          WORKER_TAGS=$(aws ecr describe-images             --repository-name "nexusdeploy-worker-$ENV"             --region ${{ env.AWS_REGION }}             --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags'             --output text 2>/dev/null || echo "latest")
          WORKER_IMAGE=$(echo "$WORKER_TAGS" | tr $'\t' $'\n' | grep -v '^latest$' | head -1)
          WORKER_IMAGE="${WORKER_IMAGE:-latest}"

          echo "api_image=$REGISTRY/nexusdeploy-api-$ENV:$API_IMAGE"       >> $GITHUB_OUTPUT
          echo "worker_image=$REGISTRY/nexusdeploy-worker-$ENV:$WORKER_IMAGE" >> $GITHUB_OUTPUT
          echo "ℹ️  Using existing images: api=$API_IMAGE worker=$WORKER_IMAGE"

  # ─────────────────────────────────────────────
  # Phase 1a: Provision ECR repositories
  # Runs in parallel with image build.
  # Must complete before images can be pushed.
  # ─────────────────────────────────────────────
  ecr-provision:
    name: Provision ECR (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    # Only needed when app changed — ECR repos already exist on infra-only pushes
    if: needs.setup.outputs.app_changed == 'true'
    environment: ${{ needs.setup.outputs.environment }}

    permissions:
      id-token: write
      contents: read

    outputs:
      registry: ${{ steps.ecr-login.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: ECRProvision-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ needs.setup.outputs.environment }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ needs.setup.outputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply — ECR only
        # Creates ECR repositories before images are pushed.
        # -target=module.ecr is intentional — only ECR is needed at this stage.
        # The full apply (with ECS, RDS etc.) runs after images are pushed.
        working-directory: terraform/environments/${{ needs.setup.outputs.environment }}
        env:
          TF_VAR_api_image:    "placeholder"
          TF_VAR_worker_image: "placeholder"
          TF_VAR_git_commit:   ${{ github.sha }}
        run: |
          terraform apply             -target=module.ecr             -var-file=terraform.tfvars             -auto-approve
          echo "✅ ECR repositories ready"

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

  # ─────────────────────────────────────────────
  # Phase 1b: Build Docker images
  # Runs in parallel with ECR provisioning.
  # Does NOT push — push happens after ECR exists.
  # ─────────────────────────────────────────────
  build-image:
    name: Build Images (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    # Skip when only infra/terraform files changed — saves ~3 minutes per deploy
    if: needs.setup.outputs.app_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (cache only — no push yet)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: false
          tags: nexusdeploy-api-${{ needs.setup.outputs.environment }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: GIT_COMMIT=${{ github.sha }}

      - name: Build Worker image (cache only — no push yet)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile.worker
          push: false
          load: false
          tags: nexusdeploy-worker-${{ needs.setup.outputs.environment }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Phase 2: Push images to ECR
  # Waits for BOTH ECR to exist AND images to be built.
  # ECR repos guaranteed to exist at this point.
  # ─────────────────────────────────────────────
  push-image:
    name: Push Images (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [setup, ecr-provision, build-image]
    if: |
      always() &&
      needs.setup.outputs.app_changed == 'true' &&
      needs.ecr-provision.result == 'success' &&
      needs.build-image.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}

    permissions:
      id-token: write
      contents: read

    outputs:
      api_image:    ${{ steps.push.outputs.api_image }}
      worker_image: ${{ steps.push.outputs.worker_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: PushImages-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ENV: ${{ needs.setup.outputs.environment }}
          TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha \
            --build-arg GIT_COMMIT=$TAG \
            --tag $REGISTRY/nexusdeploy-api-$ENV:$TAG \
            --tag $REGISTRY/nexusdeploy-api-$ENV:latest \
            --push ./app

          docker buildx build \
            --platform linux/amd64 \
            --file ./app/Dockerfile.worker \
            --cache-from type=gha \
            --tag $REGISTRY/nexusdeploy-worker-$ENV:$TAG \
            --tag $REGISTRY/nexusdeploy-worker-$ENV:latest \
            --push ./app

          echo "api_image=$REGISTRY/nexusdeploy-api-$ENV:$TAG"       >> $GITHUB_OUTPUT
          echo "worker_image=$REGISTRY/nexusdeploy-worker-$ENV:$TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # DEV DEPLOYMENT (branch: dev)
  # Straightforward: plan → apply → schedule cleanup
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: [setup, ecr-provision, push-image]
    # Run when: env is dev AND (image was pushed OR only infra changed)
    if: |
      always() &&
      needs.setup.outputs.environment == 'dev' &&
      needs.setup.outputs.tf_action == 'apply' &&
      (needs.ecr-provision.result == 'success' || needs.ecr-provision.result == 'skipped') &&
      (needs.push-image.result == 'success' || needs.setup.outputs.app_changed == 'false')
    environment: dev

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: DeployDev-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
          # Note: no dynamodb_table - see backend comment in main.tf

      - name: Terraform Apply — full infrastructure
        # ECR already exists from ecr-provision job.
        # Images already pushed from push-image job.
        # This apply creates VPC, ECS, RDS, ElastiCache etc. with real image tags.
        working-directory: terraform/environments/dev
        env:
          # Use newly pushed image if app changed, otherwise use current ECR image
          TF_VAR_api_image:    ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.api_image || needs.setup.outputs.current_api }}
          TF_VAR_worker_image: ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.worker_image || needs.setup.outputs.current_worker }}
          TF_VAR_git_commit:   ${{ github.sha }}
        run: terraform apply -var-file=terraform.tfvars -auto-approve

      - name: Get outputs
        id: outputs
        working-directory: terraform/environments/dev
        run: |
          echo "grafana_url=$(terraform output -raw grafana_url 2>/dev/null || echo 'deploying...')"    >> $GITHUB_OUTPUT
          echo "prometheus_url=$(terraform output -raw prometheus_url 2>/dev/null || echo 'deploying...')" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "## ✅ Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | ${{ steps.outputs.outputs.grafana_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | ${{ steps.outputs.outputs.prometheus_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Auto-destroy in | 30 minutes |" >> $GITHUB_STEP_SUMMARY

      # Schedule auto-cleanup after 30 minutes
      - name: Schedule auto-cleanup
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cleanup.yml',
              ref: 'dev',
              inputs: {
                environment: 'dev',
                delay_minutes: '30',
                reason: 'Auto-cleanup: dev TTL (30 min) expired'
              }
            });
            console.log('⏳ Cleanup scheduled in 30 minutes');

  # ─────────────────────────────────────────────
  # PROD DEPLOYMENT — Blue-Green (branch: main)
  #
  # Flow:
  #   1. Read active slot from SSM (blue or green)
  #   2. Deploy new image to INACTIVE slot
  #   3. Wait 24h for health checks
  #   4. Scale down OLD slot on success
  #   5. On failure: revert (scale up old, scale down new)
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy → prod (blue-green)
    runs-on: ubuntu-latest
    needs: [setup, ecr-provision, push-image]
    if: |
      always() &&
      needs.setup.outputs.environment == 'prod' &&
      needs.setup.outputs.tf_action == 'apply' &&
      (needs.ecr-provision.result == 'success' || needs.ecr-provision.result == 'skipped') &&
      (needs.push-image.result == 'success' || needs.setup.outputs.app_changed == 'false')
    environment: prod   # Requires manual approval in GitHub Environments settings

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: DeployProd-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Step 1: Read current active slot ──
      - name: Read active deployment slot from SSM
        id: slot
        run: |
          CURRENT=$(aws ssm get-parameter \
            --name "/nexusdeploy/prod/deployment/active_slot" \
            --region ${{ env.AWS_REGION }} \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "blue")

          # New deployment goes to the OPPOSITE slot
          if [[ "$CURRENT" == "blue" ]]; then
            NEW_SLOT="green"
          else
            NEW_SLOT="blue"
          fi

          echo "current_slot=$CURRENT" >> $GITHUB_OUTPUT
          echo "new_slot=$NEW_SLOT"    >> $GITHUB_OUTPUT
          echo "🔵 Current active: $CURRENT → 🟢 Deploying to: $NEW_SLOT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      # ── Step 1c: Read previous images from SSM ──
      - name: Read previous images from SSM
        id: prev_images
        run: |
          PREV_API=$(aws ssm get-parameter \
            --name "/nexusdeploy/prod/deployment/prev_api_image" \
            --query 'Parameter.Value' --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          echo "api=${PREV_API}" >> $GITHUB_OUTPUT

          PREV_WORKER=$(aws ssm get-parameter \
            --name "/nexusdeploy/prod/deployment/prev_worker_image" \
            --query 'Parameter.Value' --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          echo "worker=${PREV_WORKER}" >> $GITHUB_OUTPUT

      # ── Step 2: Deploy to new (inactive) slot ──
      - name: Terraform Apply → new slot
        id: tf_apply
        working-directory: terraform/environments/prod
        env:
          TF_VAR_api_image:    ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.api_image || needs.setup.outputs.current_api }}
          TF_VAR_worker_image: ${{ needs.setup.outputs.app_changed == 'true' && needs.push-image.outputs.worker_image || needs.setup.outputs.current_worker }}
          TF_VAR_git_commit:   ${{ github.sha }}
          # The NEW slot becomes active in this apply
          TF_VAR_deployment_slot: ${{ steps.slot.outputs.new_slot }}
          # Previous images stay on old slot (already running)
          TF_VAR_previous_api_image:    ${{ steps.prev_images.outputs.api }}
          TF_VAR_previous_worker_image: ${{ steps.prev_images.outputs.worker }}
        run: |
          terraform apply -var-file=terraform.tfvars -auto-approve
        continue-on-error: true

      # ── Step 3: Health check new slot (24 hours) ──
      - name: Health check new slot
        id: health
        if: steps.tf_apply.outcome == 'success'
        run: |
          NEW_SLOT="${{ steps.slot.outputs.new_slot }}"
          CLUSTER="nexusdeploy-prod-$NEW_SLOT"
          SERVICE="nexusdeploy-prod-$NEW_SLOT-api"
          MAX_WAIT=300   # 5 min check here; prod monitors for 24h via scheduled check
          INTERVAL=30
          ELAPSED=0
          HEALTH_OK=false

          # Set default failure state
          echo "health_ok=false" >> $GITHUB_OUTPUT

          echo "⏳ Waiting for $SERVICE to reach RUNNING state..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RUNNING=$(aws ecs describe-services \
              --cluster $CLUSTER \
              --services $SERVICE \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].runningCount' \
              --output text 2>/dev/null || echo "0")

            DESIRED=$(aws ecs describe-services \
              --cluster $CLUSTER \
              --services $SERVICE \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].desiredCount' \
              --output text 2>/dev/null || echo "1")

            echo "  Running: $RUNNING / Desired: $DESIRED (${ELAPSED}s elapsed)"

            if [[ "$RUNNING" == "$DESIRED" && "$RUNNING" != "0" ]]; then
              HEALTH_OK=true
              echo "health_ok=true" >> $GITHUB_OUTPUT
              echo "✅ New slot is healthy!"
              exit 0
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # Loop completed without success
          if [[ "$HEALTH_OK" != "true" ]]; then
            echo "health_ok=false" >> $GITHUB_OUTPUT
            echo "❌ New slot failed to become healthy"
          fi

      # ── Step 4a: SUCCESS — update SSM + scale down old slot ──
      - name: Promote new slot (update SSM active_slot)
        if: steps.health.outputs.health_ok == 'true'
        run: |
          aws ssm put-parameter \
            --name "/nexusdeploy/prod/deployment/active_slot" \
            --value "${{ steps.slot.outputs.new_slot }}" \
            --type String \
            --overwrite \
            --region ${{ env.AWS_REGION }}
          echo "✅ SSM active_slot updated to ${{ steps.slot.outputs.new_slot }}"

      - name: Store current images as 'previous' for next deploy
        if: steps.health.outputs.health_ok == 'true'
        run: |
          aws ssm put-parameter \
            --name "/nexusdeploy/prod/deployment/prev_api_image" \
            --value "${{ needs.push-image.outputs.api_image }}" \
            --type String --overwrite --region ${{ env.AWS_REGION }}
          aws ssm put-parameter \
            --name "/nexusdeploy/prod/deployment/prev_worker_image" \
            --value "${{ needs.push-image.outputs.worker_image }}" \
            --type String --overwrite --region ${{ env.AWS_REGION }}

      # Schedule old slot scale-down after 24 hours (gives time for monitoring)
      - name: Schedule old slot cleanup (24h)
        if: steps.health.outputs.health_ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cleanup.yml',
              ref: 'main',
              inputs: {
                environment: 'prod',
                action: 'drain_old_slot',
                old_slot: '${{ steps.slot.outputs.current_slot }}',
                delay_minutes: '1440',  // 24 hours
                reason: 'Blue-green: draining old slot after 24h'
              }
            });

      # ── Step 4b: FAILURE — rollback ──────────────
      - name: Rollback - revert to old slot
        if: steps.tf_apply.outcome == 'failure' || steps.health.outputs.health_ok != 'true'
        run: |
          echo "⚠️ Deployment failed - rolling back to ${{ steps.slot.outputs.current_slot }}"

          # Scale new (failed) slot back to 0
          FAILED_CLUSTER="nexusdeploy-prod-${{ steps.slot.outputs.new_slot }}"
          for svc in api worker beat; do
            aws ecs update-service \
              --cluster $FAILED_CLUSTER \
              --service "nexusdeploy-prod-${{ steps.slot.outputs.new_slot }}-$svc" \
              --desired-count 0 \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
          done

          # SSM unchanged - old slot remains active
          echo "✅ Rollback complete - ${{ steps.slot.outputs.current_slot }} remains active"

      - name: Deployment summary
        if: always()
        run: |
          if [[ "${{ steps.health.outputs.health_ok }}" == "true" ]]; then
            echo "## ✅ Prod Blue-Green Deployment Complete" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Previous slot | ${{ steps.slot.outputs.current_slot }} (draining in 24h) |" >> $GITHUB_STEP_SUMMARY
            echo "| Active slot   | ${{ steps.slot.outputs.new_slot }} ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| Image         | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Prod Deployment Failed - Rolled Back" >> $GITHUB_STEP_SUMMARY
            echo "Active slot remains: ${{ steps.slot.outputs.current_slot }}" >> $GITHUB_STEP_SUMMARY
          fi