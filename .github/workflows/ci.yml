name: CI - Test & Build

on:
  push:
    branches: [main, dev, staging, "feature/**"]
  pull_request:
    branches: [main, dev, staging]
  workflow_dispatch: # allow manual trigger
    inputs:
      deploy:
        description: "Also dispatch a deploy after CI passes (manual runs only; off = CI without deploy)"
        type: boolean
        default: false

# One CI run per branch — a newer push cancels the in-progress run for the
# same ref, so a burst of merges (e.g. several dependabot PRs) doesn't queue
# a pile of stale runs waiting for hosted runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least privilege by default: every job inherits read-only access to the repo.
# The three jobs that need more declare it themselves —
#   lint / terraform-lint : contents: write   (push auto-format commits)
#   docker-build          : security-events: write (upload the Grype SARIF)
#   ci-summary            : actions: write    (dispatch the deploy workflow)
# Granting write here would hand the elevated token to every job, including the
# ones that run third-party actions over pull-request code.
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 0: Detect what changed
  # Runs first so all other jobs can skip intelligently.
  # ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      app_changed: ${{ steps.filter.outputs.app }}
      infra_changed: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history — a multi-commit push is diffed against
          # github.event.before, which can be many commits back.
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: |
          # Manual dispatch = full run. Path filtering only applies to
          # automatic triggers (push / pull_request).
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "app=true"   >> $GITHUB_OUTPUT
            echo "infra=true" >> $GITHUB_OUTPUT
            echo "🖐️ Manual dispatch — running all checks regardless of changed paths"
            exit 0
          fi

          # Diff the whole trigger range, not just the last commit:
          #   push         → event.before..HEAD covers every commit in the push
          #   new branch   → event.before is all zeros — fall back to HEAD~1
          #   pull_request → HEAD is the synthetic merge commit, so HEAD~1 is
          #                  the base branch tip and the diff is the full PR
          # If the diff fails (e.g. force push pruned event.before), fall back
          # to treating everything as changed — safe, just runs more jobs.
          BASE="HEAD~1"
          if [[ "${{ github.event_name }}" == "push" && \
                "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            BASE="${{ github.event.before }}"
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || printf 'app/\nterraform/\n')

          if echo "$CHANGED" | grep -q "^app/"; then
            echo "app=true"  >> $GITHUB_OUTPUT
            echo "📦 App code changed"
          else
            echo "app=false" >> $GITHUB_OUTPUT
            echo "⏭️  No app changes"
          fi

          if echo "$CHANGED" | grep -qE "^terraform/|^\.github/"; then
            echo "infra=true"  >> $GITHUB_OUTPUT
            echo "🏗️  Infra/workflow changed"
          else
            echo "infra=false" >> $GITHUB_OUTPUT
            echo "⏭️  No infra changes"
          fi

  # ─────────────────────────────────────────────
  # JOB 1: Lint & Static Analysis
  # Always runs — catches hardcoded credentials,
  # formatting issues, and security anti-patterns
  # regardless of what changed.
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'

    permissions:
      contents: write # needed to push auto-format commits

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install lint dependencies
        run: pip install flake8 black isort bandit pip-audit

      - name: Auto-format with black and isort
        run: |
          cd app
          black .
          isort .

      - name: Commit formatting changes (if any)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply black and isort formatting [skip ci]"
            git push
            echo "✅ Formatting fixes committed and pushed"
          else
            echo "✅ No formatting changes needed"
          fi

      - name: Run flake8
        run: flake8 app/ --max-line-length=120 --exclude=migrations/

      - name: Run bandit (security scan)
        run: bandit -r app/src/ -ll -x app/src/tests/
        continue-on-error: true

      - name: Run pip-audit (dependency vulnerability scan)
        # Replaces `safety`, which now requires an authenticated account and
        # EOFs in non-interactive CI (scanning nothing). pip-audit is free, needs
        # no login, and reads requirements.txt directly. Non-blocking, same intent
        # as the bandit/grype scans: visibility, not a hard gate.
        run: pip-audit --requirement app/requirements.txt --desc
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2: Unit & Integration Tests
  # Skipped when only infra files changed.
  # Runs in PARALLEL with docker-build.
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [detect-changes, lint]
    # Only run when app code changed AND lint passed
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.app_changed == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nexusdeploy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexusdeploy_test
          REDIS_URL: redis://localhost:6379/15
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret-key-minimum-32-bytes!!
          ENV: testing
        run: |
          cd app
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        # Codecov dropped tokenless uploads — without CODECOV_TOKEN the upload is
        # rejected ("not valid tokenless upload"). Add the repo secret to enable
        # it; until then this is best-effort and must never fail the run.
        continue-on-error: true
        with:
          files: app/coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build & Security Scan
  # Skipped when only infra files changed.
  # Runs in PARALLEL with test — no dependency between them.
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, lint]
    # Parallel with test — only needs lint to pass, not test
    if: |
      !cancelled() &&
      needs.detect-changes.outputs.app_changed == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build API image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: nexusdeploy-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        id: grype
        with:
          image: nexusdeploy-api:${{ github.sha }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif

      - name: Display Grype scan summary
        if: ${{ !cancelled() }}
        run: |
          echo "::group::Grype Scan Results"
          cat ${{ steps.grype.outputs.sarif }} \
            | jq '.runs[].results[] | {ruleId, message: .message.text}' \
            2>/dev/null || echo "No vulnerabilities found or sarif parse error"
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        # Skip when the scan never ran (e.g. docker build failed) — with a
        # plain always() this step errored on the missing sarif_file input.
        # !cancelled() (not always()) so a superseded run stops here too.
        if: ${{ !cancelled() && steps.grype.outputs.sarif != '' }}
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 4: Terraform Lint
  # Skipped when only app files changed.
  # Runs in PARALLEL with lint, test, docker-build.
  # ─────────────────────────────────────────────
  terraform-lint:
    name: Terraform Validate & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    # Only run when terraform or workflow files changed
    if: needs.detect-changes.outputs.infra_changed == 'true'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.7.0

      - name: Auto-format Terraform files
        run: terraform fmt -recursive terraform/

      - name: Commit Terraform formatting changes (if any)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply terraform fmt formatting [skip ci]"
            git push
            echo "✅ Terraform formatting fixes committed and pushed"
          else
            echo "✅ No Terraform formatting changes needed"
          fi

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6

      - name: Run TFLint
        run: |
          cd terraform
          tflint --init
          tflint --recursive
        continue-on-error: true

      # Checkov is a static security scanner for IaC. Non-blocking, for the same
      # reason Grype is: the intent is visibility, not a hard gate. A finding
      # here should start a conversation, not fail an unrelated deploy.
      - name: Run Checkov (IaC security scan)
        continue-on-error: true
        run: |
          pip install --quiet checkov
          checkov \
            --directory terraform/ \
            --quiet \
            --compact \
            --soft-fail \
            --output cli \
            --skip-check CKV_AWS_79,CKV2_AWS_5
          # CKV_AWS_79   IMDSv1 — the monitoring user_data already uses IMDSv2 tokens.
          # CKV2_AWS_5   "SG is unattached" — false positive: the SGs are wired in
          #              via variables from the environment root, which Checkov
          #              does not follow across module boundaries.

      - name: Validate each environment
        continue-on-error: true
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tf-plugin-cache
          # Fake values so terraform plan can evaluate templatefile() and
          # other functions that validate doesn't catch
          TF_VAR_api_image: "placeholder"
          TF_VAR_worker_image: "placeholder"
          TF_VAR_git_commit: "ci-validate"
          # Required by staging/prod; dev doesn't declare it — a TF_VAR env var
          # is silently ignored there, unlike -var which is a hard error
          TF_VAR_monitoring_allowed_cidr: "[]"
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          for env in dev staging prod; do
            echo "Validating $env..."
            cd terraform/environments/$env
            terraform init -backend=false -input=false
            terraform validate
            # plan -refresh=false catches templatefile() and function errors
            # that validate misses — no real AWS calls made with -backend=false
            terraform plan -refresh=false -input=false \
              -var-file=terraform.tfvars \
              -var="aws_region=us-east-1" \
              -var="tf_state_bucket=nexusdeploy-terraform-state" \
              -var="app_s3_bucket=nexusdeploy-attachments-${env}" \
              -var="db_name=nexusdeploy" \
              2>&1 | grep -E "^Error:|^Warning:|Plan:|will be created|will be destroyed" || true
            cd ../../..
          done

  # ─────────────────────────────────────────────
  # SUMMARY: Gate + dispatch deploy on success
  # Waits for all jobs — skipped jobs count as passed.
  # ─────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes, lint, test, docker-build, terraform-lint]
    # !cancelled(), NOT always(): with always() a run cancelled by
    # concurrency cancel-in-progress would still reach this job, count the
    # cancelled jobs as passed, and dispatch a deploy for the stale commit.
    if: ${{ !cancelled() }}
    # actions: write is what lets this job dispatch deploy.yml. It used to be
    # inherited from a workflow-level grant that also handed it to every other
    # job; it is scoped to this one job now.
    permissions:
      actions: write
      contents: read
    steps:
      - name: Check all jobs passed
        run: |
          # A job result of 'skipped' means it wasn't needed — treat as pass
          APP_CHANGED="${{ needs.detect-changes.outputs.app_changed }}"
          INFRA_CHANGED="${{ needs.detect-changes.outputs.infra_changed }}"

          FAILED=false

          # Check app jobs only if app changed
          if [[ "$APP_CHANGED" == "true" ]]; then
            if [[ "${{ needs.lint.result }}"         == "failure" ]] || \
               [[ "${{ needs.test.result }}"         == "failure" ]] || \
               [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
              echo "❌ App CI failed — deploy will not run"
              FAILED=true
            fi
          fi

          # Check infra jobs only if infra changed
          if [[ "$INFRA_CHANGED" == "true" ]]; then
            if [[ "${{ needs.terraform-lint.result }}" == "failure" ]]; then
              echo "❌ Terraform CI failed — deploy will not run"
              FAILED=true
            fi
          fi

          if [[ "$FAILED" == "true" ]]; then
            exit 1
          fi

          echo "✅ All required CI checks passed"
          echo "   App jobs:   ${{ needs.lint.result }} / ${{ needs.test.result }} / ${{ needs.docker-build.result }}"
          echo "   Infra jobs: ${{ needs.terraform-lint.result }}"

      - name: Trigger deploy pipeline
        # Deploys cost real AWS money — dependency bumps should run CI but
        # never auto-deploy. Covers all three merge styles of a Dependabot PR:
        # squash ("chore(deps): ..." or "chore(deps-dev): ..."), merge commit
        # ("Merge pull request ... from <org>/dependabot/..."), and direct
        # dependabot pushes. The 'chore(deps' prefix (no closing paren) matches
        # both the deps and deps-dev groups.
        # An explicit [skip deploy] in the head commit message also skips it.
        # A manual run (workflow_dispatch) never deploys UNLESS the 'deploy'
        # input is checked in the Run-workflow UI — so the default manual run
        # is "CI without deploy".
        if: |
          (github.ref_name == 'dev' || github.ref_name == 'staging' || github.ref_name == 'main') &&
          (
            (github.event_name == 'push' &&
             github.actor != 'dependabot[bot]' &&
             !startsWith(github.event.head_commit.message, 'chore(deps') &&
             !contains(github.event.head_commit.message, 'dependabot/') &&
             !contains(github.event.head_commit.message, '[skip deploy]'))
            ||
            (github.event_name == 'workflow_dispatch' && inputs.deploy)
          )
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const envMap = { main: 'prod', staging: 'staging', dev: 'dev' };
            const environment = envMap[branch] || 'dev';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: context.ref,
              inputs: {
                environment,
                action: 'apply',
                app_changed: '${{ needs.detect-changes.outputs.app_changed }}'
              }
            });
            console.log(`🚀 Deploy triggered for ${branch} → ${environment}`);

      - name: Deploy dispatch skipped (dependency bump, [skip deploy], or manual run)
        if: |
          (github.ref_name == 'dev' || github.ref_name == 'staging' || github.ref_name == 'main') &&
          (
            (github.event_name == 'push' &&
             (github.actor == 'dependabot[bot]' ||
              startsWith(github.event.head_commit.message, 'chore(deps') ||
              contains(github.event.head_commit.message, 'dependabot/') ||
              contains(github.event.head_commit.message, '[skip deploy]')))
            ||
            (github.event_name == 'workflow_dispatch' && !inputs.deploy)
          )
        run: |
          echo "⏭️  CI passed but deploy was NOT dispatched — dependency bump, [skip deploy] marker, or a manual run with deploy unchecked." | tee -a $GITHUB_STEP_SUMMARY
          echo "Re-run with the 'deploy' box checked, or run deploy.yml manually (Actions → Deploy → Run workflow), to ship this change." | tee -a $GITHUB_STEP_SUMMARY
