name: CI - Test & Build

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch: # allow manual trigger

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Needed so ci-summary can dispatch the deploy workflow
permissions:
  actions: write
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 0: Detect what changed
  # Runs first so all other jobs can skip intelligently.
  # ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.filter.outputs.app }}
      infra_changed: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "app/ terraform/")

          if echo "$CHANGED" | grep -q "^app/"; then
            echo "app=true"  >> $GITHUB_OUTPUT
            echo "📦 App code changed"
          else
            echo "app=false" >> $GITHUB_OUTPUT
            echo "⏭️  No app changes"
          fi

          if echo "$CHANGED" | grep -qE "^terraform/|^\.github/"; then
            echo "infra=true"  >> $GITHUB_OUTPUT
            echo "🏗️  Infra/workflow changed"
          else
            echo "infra=false" >> $GITHUB_OUTPUT
            echo "⏭️  No infra changes"
          fi

  # ─────────────────────────────────────────────
  # JOB 1: Lint & Static Analysis
  # Always runs — catches hardcoded credentials,
  # formatting issues, and security anti-patterns
  # regardless of what changed.
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'

    permissions:
      contents: write # needed to push auto-format commits

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install lint dependencies
        run: pip install flake8 black isort bandit safety

      - name: Auto-format with black and isort
        run: |
          cd app
          black .
          isort .

      - name: Commit formatting changes (if any)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply black and isort formatting [skip ci]"
            git push
            echo "✅ Formatting fixes committed and pushed"
          else
            echo "✅ No formatting changes needed"
          fi

      - name: Run flake8
        run: flake8 app/ --max-line-length=120 --exclude=migrations/

      - name: Run bandit (security scan)
        run: bandit -r app/src/ -ll -x app/src/tests/
        continue-on-error: true

      - name: Run safety (dependency vulnerability scan)
        run: safety scan --target app/
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2: Unit & Integration Tests
  # Skipped when only infra files changed.
  # Runs in PARALLEL with docker-build.
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    # Only run when app code changed AND lint passed
    if: |
      always() &&
      needs.detect-changes.outputs.app_changed == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nexusdeploy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexusdeploy_test
          REDIS_URL: redis://localhost:6379/15
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret-key-minimum-32-bytes!!
          ENV: testing
        run: |
          cd app
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          file: app/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # JOB 3: Docker Build & Security Scan
  # Skipped when only infra files changed.
  # Runs in PARALLEL with test — no dependency between them.
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    # Parallel with test — only needs lint to pass, not test
    if: |
      always() &&
      needs.detect-changes.outputs.app_changed == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: nexusdeploy-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Grype
        uses: anchore/scan-action@v7
        id: grype
        with:
          image: nexusdeploy-api:${{ github.sha }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif

      - name: Display Grype scan summary
        if: always()
        run: |
          echo "::group::Grype Scan Results"
          cat ${{ steps.grype.outputs.sarif }} \
            | jq '.runs[].results[] | {ruleId, message: .message.text}' \
            2>/dev/null || echo "No vulnerabilities found or sarif parse error"
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 4: Terraform Lint
  # Skipped when only app files changed.
  # Runs in PARALLEL with lint, test, docker-build.
  # ─────────────────────────────────────────────
  terraform-lint:
    name: Terraform Validate & Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    # Only run when terraform or workflow files changed
    if: needs.detect-changes.outputs.infra_changed == 'true'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Auto-format Terraform files
        run: terraform fmt -recursive terraform/

      - name: Commit Terraform formatting changes (if any)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply terraform fmt formatting [skip ci]"
            git push
            echo "✅ Terraform formatting fixes committed and pushed"
          else
            echo "✅ No Terraform formatting changes needed"
          fi

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          cd terraform
          tflint --init
          tflint --recursive
        continue-on-error: true

      - name: Validate each environment
        continue-on-error: true
        env:
          TF_PLUGIN_CACHE_DIR: ${{ runner.temp }}/tf-plugin-cache
          # Fake values so terraform plan can evaluate templatefile() and
          # other functions that validate doesn't catch
          TF_VAR_api_image: "placeholder"
          TF_VAR_worker_image: "placeholder"
          TF_VAR_git_commit: "ci-validate"
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          for env in dev prod; do
            echo "Validating $env..."
            cd terraform/environments/$env
            terraform init -backend=false -input=false
            terraform validate
            # plan -refresh=false catches templatefile() and function errors
            # that validate misses — no real AWS calls made with -backend=false
            terraform plan -refresh=false               -var-file=terraform.tfvars               -var="aws_region=us-east-1"               -var="tf_state_bucket=nexusdeploy-terraform-state"               -var="app_s3_bucket=nexusdeploy-attachments-dev"               -var="db_name=nexusdeploy"               2>&1 | grep -E "^Error:|^Warning:|Plan:|will be created|will be destroyed" || true
            cd ../../..
          done

  # ─────────────────────────────────────────────
  # SUMMARY: Gate + dispatch deploy on success
  # Waits for all jobs — skipped jobs count as passed.
  # ─────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, test, docker-build, terraform-lint]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          # A job result of 'skipped' means it wasn't needed — treat as pass
          APP_CHANGED="${{ needs.detect-changes.outputs.app_changed }}"
          INFRA_CHANGED="${{ needs.detect-changes.outputs.infra_changed }}"

          FAILED=false

          # Check app jobs only if app changed
          if [[ "$APP_CHANGED" == "true" ]]; then
            if [[ "${{ needs.lint.result }}"         == "failure" ]] || \
               [[ "${{ needs.test.result }}"         == "failure" ]] || \
               [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
              echo "❌ App CI failed — deploy will not run"
              FAILED=true
            fi
          fi

          # Check infra jobs only if infra changed
          if [[ "$INFRA_CHANGED" == "true" ]]; then
            if [[ "${{ needs.terraform-lint.result }}" == "failure" ]]; then
              echo "❌ Terraform CI failed — deploy will not run"
              FAILED=true
            fi
          fi

          if [[ "$FAILED" == "true" ]]; then
            exit 1
          fi

          echo "✅ All required CI checks passed"
          echo "   App jobs:   ${{ needs.lint.result }} / ${{ needs.test.result }} / ${{ needs.docker-build.result }}"
          echo "   Infra jobs: ${{ needs.terraform-lint.result }}"

      - name: Trigger deploy pipeline
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'dev' || github.ref_name == 'main')
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: context.ref,
              inputs: {
                environment: branch === 'main' ? 'prod' : 'dev',
                action: 'apply',
                app_changed: '${{ needs.detect-changes.outputs.app_changed }}'
              }
            });
            console.log(`🚀 Deploy triggered for ${branch}`);
