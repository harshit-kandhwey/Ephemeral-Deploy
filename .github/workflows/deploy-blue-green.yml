name: Deploy (blue-green, reusable)

# Reusable blue-green deployment for staging and prod. Both environments run the
# identical slot-rotation flow — read active slot from SSM, deploy to the
# inactive slot, health-gate it, promote, then schedule the old-slot drain — so
# the job lives here once and deploy.yml calls it twice with different inputs.
#
# Differences between the two callers are entirely captured by inputs:
#   staging → drain after 2h,  ref staging, runs init_db (ephemeral DB)
#   prod    → drain after 24h, ref main,    no init_db, manual-approval gated
#             (the approval comes from the `prod` GitHub Environment protection
#              rules, which still apply because this job sets environment: prod)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (staging | prod)"
        required: true
        type: string
      drain_minutes:
        description: "Minutes to wait before draining the old slot"
        required: true
        type: string
      drain_ref:
        description: "Git ref cleanup.yml is dispatched against for the drain"
        required: true
        type: string
      drain_label:
        description: "Human label for the drain delay (e.g. 2h, 24h)"
        required: true
        type: string
      run_init_db:
        description: "Run the init_db one-off ECS task after a healthy deploy"
        required: false
        type: boolean
        default: false
      app_changed:
        description: "Whether app code changed (passed from CI/setup)"
        required: true
        type: string
      api_image:
        description: "Resolved API image URI to deploy"
        required: true
        type: string
      worker_image:
        description: "Resolved worker image URI to deploy"
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  TF_STATE_BUCKET: nexusdeploy-terraform-state
  TF_LOCK_TABLE: nexusdeploy-terraform-locks
  # Reusable workflows do NOT inherit the caller's env — repeat this so JS
  # actions run on the same Node runtime they did in the inline jobs.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy → ${{ inputs.environment }} (blue-green)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Serialize per environment so two runs can't both read the same active
    # slot and independently promote/roll back. (The caller is already grouped
    # by ref, which maps 1:1 to env, but this makes the reusable job self-safe.)
    concurrency:
      group: blue-green-${{ inputs.environment }}
      cancel-in-progress: false
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      # Job-level permissions REPLACE the workflow defaults — without this the
      # in-job "Schedule old slot drain" dispatch of cleanup.yml gets a 403.
      actions: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: Deploy-${{ inputs.environment }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ inputs.environment }}
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Check state freshness
        id: state_check
        working-directory: terraform/environments/${{ inputs.environment }}
        run: |
          # Orphan reconciliation (delete + adopt below) exists ONLY to recover
          # from a wiped state after a cleanup. When state persists across a
          # normal deploy it already tracks every resource, so we skip it —
          # otherwise the delete step would churn live log groups every deploy.
          # Fail CLOSED: a backend/lock/auth/network error must not read as an
          # empty state and trigger destructive reconciliation of live resources.
          if ! state_list=$(terraform state list 2>&1); then
            echo "::error::'terraform state list' failed — aborting to avoid destructive reconciliation on an unknown state."
            echo "$state_list"
            exit 1
          fi
          if [[ -z "$state_list" ]]; then
            echo "🆕 State is empty (post-cleanup or first deploy) — orphan reconciliation will run."
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "📦 State has resources — skipping orphan reconciliation (persistent state)."
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete orphaned resources
        if: steps.state_check.outputs.fresh == 'true'
        continue-on-error: true
        run: |
          ENV="${{ inputs.environment }}"
          REGION="${{ env.AWS_REGION }}"
          PROJECT="nexusdeploy"

          for slot in slot1 slot2; do
            for svc in api worker beat; do
              lg="/ecs/$PROJECT/$ENV-$slot/$svc"
              if aws logs describe-log-groups \
                  --log-group-name-prefix "$lg" --region "$REGION" \
                  --query 'logGroups[0].logGroupName' --output text 2>/dev/null | grep -q "$lg"; then
                echo "🗑️  Deleting orphaned log group: $lg"
                aws logs delete-log-group --log-group-name "$lg" --region "$REGION" 2>/dev/null || true
              fi
            done
          done

          for secret_id in "$PROJECT/$ENV/app-secrets" "$PROJECT/$ENV/init-secrets" "$PROJECT/$ENV/seed-secrets"; do
            SECRET_STATE=$(aws secretsmanager describe-secret \
              --secret-id "$secret_id" --region "$REGION" \
              --query 'DeletedDate' --output text 2>/dev/null || echo "NOT_FOUND")
            if [[ "$SECRET_STATE" != "NOT_FOUND" && "$SECRET_STATE" != "None" ]]; then
              echo "🗑️  Force-deleting secret pending deletion: $secret_id"
              aws secretsmanager delete-secret \
                --secret-id "$secret_id" \
                --force-delete-without-recovery \
                --region "$REGION" 2>/dev/null || true
            fi
          done

          MONITORING_ROLE="$PROJECT-$ENV-monitoring-ec2"
          MONITORING_PROFILE="$PROJECT-$ENV-monitoring"
          if aws iam get-instance-profile --instance-profile-name "$MONITORING_PROFILE" 2>/dev/null; then
            aws iam remove-role-from-instance-profile \
              --instance-profile-name "$MONITORING_PROFILE" \
              --role-name "$MONITORING_ROLE" 2>/dev/null || true
            aws iam delete-instance-profile \
              --instance-profile-name "$MONITORING_PROFILE" 2>/dev/null || true
          fi
          if aws iam get-role --role-name "$MONITORING_ROLE" 2>/dev/null; then
            for policy in $(aws iam list-attached-role-policies \
              --role-name "$MONITORING_ROLE" \
              --query 'AttachedPolicies[*].PolicyArn' --output text 2>/dev/null || echo ""); do
              aws iam detach-role-policy --role-name "$MONITORING_ROLE" --policy-arn "$policy" 2>/dev/null || true
            done
            for policy in $(aws iam list-role-policies \
              --role-name "$MONITORING_ROLE" \
              --query 'PolicyNames[*]' --output text 2>/dev/null || echo ""); do
              aws iam delete-role-policy --role-name "$MONITORING_ROLE" --policy-name "$policy" 2>/dev/null || true
            done
            aws iam delete-role --role-name "$MONITORING_ROLE" 2>/dev/null || true
          fi
          echo "✅ Orphaned resource cleanup complete"

      - name: Adopt orphaned Terraform resources
        # Runs on EVERY deploy: adopt() self-skips resources already in state, so
        # it is a no-op on healthy persistent state, but on a partial state (e.g.
        # a re-run after a mid-apply failure) it still imports surviving resources
        # like ECR repos and the VPC flow-log group that outlive a cleanup.
        working-directory: terraform/environments/${{ inputs.environment }}
        env:
          TF_VAR_api_image: "placeholder"
          TF_VAR_worker_image: "placeholder"
          TF_VAR_git_commit: "placeholder"
          TF_VAR_monitoring_allowed_cidr: "[]"
        run: |
          ENV="${{ inputs.environment }}"
          adopt() {
            local addr=$1 id=$2
            terraform state show "$addr" &>/dev/null && return 0
            terraform import -var-file=terraform.tfvars "$addr" "$id" || true
          }

          # A destroy leaves secrets "scheduled for deletion" whenever
          # recovery_window_in_days > 0 (prod keeps 7 as a safety net; staging
          # uses 0). AWS reserves the NAME for the whole window, so a redeploy
          # inside it fails on both create and import — restore first. A no-op
          # when the window is 0.
          restore_secret() {
            local id=$1 deleted
            deleted=$(aws secretsmanager describe-secret --secret-id "$id" \
              --query 'DeletedDate' --output text 2>/dev/null) || return 0
            [[ -z "$deleted" || "$deleted" == "None" ]] && return 0
            echo "Restoring secret scheduled for deletion: $id"
            aws secretsmanager restore-secret --secret-id "$id" >/dev/null || true
          }
          restore_secret "nexusdeploy/$ENV/app-secrets"
          restore_secret "nexusdeploy/$ENV/init-secrets"
          restore_secret "nexusdeploy/$ENV/seed-secrets"

          adopt aws_secretsmanager_secret.app                     "nexusdeploy/$ENV/app-secrets"
          adopt aws_secretsmanager_secret.init                    "nexusdeploy/$ENV/init-secrets"
          adopt aws_secretsmanager_secret.seed                    "nexusdeploy/$ENV/seed-secrets"
          adopt module.iam.aws_iam_role.ecs_execution             "nexusdeploy-$ENV-ecs-execution"
          adopt module.iam.aws_iam_role.ecs_execution_worker      "nexusdeploy-$ENV-ecs-execution-worker"
          adopt module.iam.aws_iam_role.ecs_task                  "nexusdeploy-$ENV-ecs-task"
          adopt module.iam.aws_iam_role.vpc_flow_log              "nexusdeploy-$ENV-vpc-flow-log"
          adopt module.vpc.aws_cloudwatch_log_group.vpc_flow_logs "/aws/vpc/flowlogs/nexusdeploy-$ENV"
          adopt aws_ssm_parameter.active_slot                     "/nexusdeploy/$ENV/deployment/active_slot"
          adopt module.ecr.aws_ecr_repository.api                 "nexusdeploy-api-$ENV"
          adopt module.ecr.aws_ecr_repository.worker              "nexusdeploy-worker-$ENV"

      - name: Read active deployment slot from SSM
        id: slot
        run: |
          # FAIL CLOSED. Only a genuine "the parameter does not exist" may be read
          # as a first deploy. Swallowing every error (the old `|| echo none`) made
          # an AccessDenied or a throttle indistinguishable from a fresh
          # environment — so a transient IAM/API blip would target slot1 and
          # redeploy straight over the LIVE slot.
          set +e
          CURRENT=$(aws ssm get-parameter \
            --name "/nexusdeploy/${{ inputs.environment }}/deployment/active_slot" \
            --region ${{ env.AWS_REGION }} \
            --query 'Parameter.Value' \
            --output text 2>&1)
          RC=$?
          set -e

          if [[ $RC -ne 0 ]]; then
            if grep -q 'ParameterNotFound' <<<"$CURRENT"; then
              echo "🆕 No active_slot parameter — treating as first deploy."
              CURRENT="none"
            else
              echo "::error::Could not read active_slot from SSM (exit $RC). Refusing to guess the active slot — a wrong guess redeploys over the live one."
              echo "$CURRENT"
              exit 1
            fi
          elif [[ "$CURRENT" != "slot1" && "$CURRENT" != "slot2" ]]; then
            echo "::error::active_slot holds an unexpected value: '$CURRENT'. Expected slot1 or slot2."
            exit 1
          fi

          # New deployment goes to the OPPOSITE slot; a first deploy goes to slot1.
          if [[ "$CURRENT" == "slot1" ]]; then
            NEW_SLOT="slot2"
          else
            NEW_SLOT="slot1"
          fi

          echo "current_slot=$CURRENT" >> $GITHUB_OUTPUT
          echo "new_slot=$NEW_SLOT"    >> $GITHUB_OUTPUT
          echo "🔵 Current active: $CURRENT → 🟢 Deploying to: $NEW_SLOT"

      - name: Read previous images from SSM
        id: prev_images
        run: |
          # Fall back to "placeholder" (the variables.tf default) on first deploy —
          # an empty TF_VAR still counts as "set" and would register a task def with image ""
          PREV_API=$(aws ssm get-parameter \
            --name "/nexusdeploy/${{ inputs.environment }}/deployment/prev_api_image" \
            --query 'Parameter.Value' --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "placeholder")
          echo "api=${PREV_API:-placeholder}" >> $GITHUB_OUTPUT

          PREV_WORKER=$(aws ssm get-parameter \
            --name "/nexusdeploy/${{ inputs.environment }}/deployment/prev_worker_image" \
            --query 'Parameter.Value' --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "placeholder")
          echo "worker=${PREV_WORKER:-placeholder}" >> $GITHUB_OUTPUT

      # Written BEFORE the apply, not after promotion, and deliberately so.
      #
      # A generation that only advances on success cannot invalidate the drains
      # that a FAILED deploy endangers. The failing case: deploy B applies a
      # newer Terraform revision, fails its gate, and rolls back — but the
      # rollback apply keeps every infrastructure change B's revision carried.
      # Deploy A's drain is still pending, still sees A's generation as current,
      # and its "capacity-only" apply runs against A's older pinned revision —
      # quietly reverting B's infrastructure hours later.
      #
      # Advancing on every apply ATTEMPT closes that: any deploy that could have
      # touched infrastructure invalidates the pending drains. The cost is that a
      # failed deploy also aborts a healthy pending drain, leaving the old slot at
      # capacity until someone re-runs it. That is the safe direction to fail, and
      # cleanup.yml's summary reports it as an abort rather than a drain.
      - name: Record deployment attempt epoch
        run: |
          aws ssm put-parameter \
            --name "/nexusdeploy/${{ inputs.environment }}/deployment/generation" \
            --value "${{ github.run_id }}" \
            --type String \
            --overwrite \
            --region ${{ env.AWS_REGION }}
          echo "🔖 Deployment attempt epoch: ${{ github.run_id }}"

      - name: Terraform Apply → new slot
        id: tf_apply
        timeout-minutes: 30
        working-directory: terraform/environments/${{ inputs.environment }}
        env:
          TF_VAR_api_image: ${{ inputs.api_image }}
          TF_VAR_worker_image: ${{ inputs.worker_image }}
          TF_VAR_git_commit: ${{ github.sha }}
          # The NEW slot becomes active in this apply
          TF_VAR_deployment_slot: ${{ steps.slot.outputs.new_slot }}
          # OVERLAP. Hold the old slot at capacity through this apply so it keeps
          # serving while the new slot boots and health-checks. Without it a
          # single apply scales the old slot to 0 while the new one is still
          # inside its 60s startPeriod — a real outage window, and a rollback
          # then has to resurrect capacity Terraform believes should be 0.
          # cleanup.yml applies with `false` once the drain delay expires.
          #
          # Held false on a FIRST deploy: there is no previous slot, and the
          # standby slot's image is still the "placeholder" default — overlapping
          # it would ask ECS to run a task definition that can never pull.
          TF_VAR_keep_previous_slot_running: ${{ steps.slot.outputs.current_slot != 'none' }}
          # Previous images stay on old slot (already running)
          TF_VAR_previous_api_image: ${{ steps.prev_images.outputs.api }}
          TF_VAR_previous_worker_image: ${{ steps.prev_images.outputs.worker }}
          # Set in GitHub → Settings → Environments → <env> → Variables → MONITORING_ALLOWED_CIDR
          # Accepts plain CIDR (1.2.3.4/32) or JSON array (["1.2.3.4/32"]) — normalized below
          TF_VAR_monitoring_allowed_cidr: ${{ vars.MONITORING_ALLOWED_CIDR }}
          # Optional: GitHub → Environments → <env> → Variables → ALERT_EMAIL.
          # Empty is fine (module default) — the SNS topic is still created and
          # wired; a value adds an email subscription (one-time confirmation).
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
        run: |
          # Fail closed on unresolved previous images. The prev_images step turns
          # every SSM error into "placeholder", and on a non-first deploy the
          # overlap holds the old slot AT CAPACITY while Terraform assigns it
          # exactly these images — so a transient SSM failure would replace the
          # serving tasks with an unpullable task definition. That is the outage
          # the overlap exists to prevent.
          if [[ "${{ steps.slot.outputs.current_slot }}" != "none" ]]; then
            if [[ -z "${TF_VAR_previous_api_image:-}" || "${TF_VAR_previous_api_image}" == "placeholder" || \
                  -z "${TF_VAR_previous_worker_image:-}" || "${TF_VAR_previous_worker_image}" == "placeholder" ]]; then
              echo "::error::Previous images did not resolve (api='${TF_VAR_previous_api_image:-}', worker='${TF_VAR_previous_worker_image:-}') but slot ${{ steps.slot.outputs.current_slot }} is live. Refusing to apply — this would re-image the serving slot with a placeholder."
              exit 1
            fi
          fi

          if [[ -z "${TF_VAR_monitoring_allowed_cidr:-}" ]]; then
            echo "::error::MONITORING_ALLOWED_CIDR is not set. Add it in GitHub → Settings → Environments → ${{ inputs.environment }} → Variables."
            exit 1
          fi
          # Normalize: wrap plain CIDR in JSON array so Terraform never falls into interactive prompt
          if [[ "${TF_VAR_monitoring_allowed_cidr}" != \[* ]]; then
            export TF_VAR_monitoring_allowed_cidr='["'"${TF_VAR_monitoring_allowed_cidr}"'"]'
          fi
          terraform apply -input=false -var-file=terraform.tfvars -auto-approve
        continue-on-error: true

      - name: Health check new slot
        id: health
        if: steps.tf_apply.outcome == 'success'
        run: |
          NEW_SLOT="${{ steps.slot.outputs.new_slot }}"
          CLUSTER="nexusdeploy-${{ inputs.environment }}-$NEW_SLOT"
          SERVICE="nexusdeploy-${{ inputs.environment }}-$NEW_SLOT-api"
          MAX_WAIT=420   # widened: we now wait out the 60s startPeriod + first /health pass
          INTERVAL=30
          ELAPSED=0

          echo "health_ok=false" >> $GITHUB_OUTPUT
          echo "⏳ Waiting for $SERVICE tasks to report HEALTHY..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RUNNING=$(aws ecs describe-services \
              --cluster $CLUSTER --services $SERVICE \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].runningCount' --output text 2>/dev/null || echo "0")

            DESIRED=$(aws ecs describe-services \
              --cluster $CLUSTER --services $SERVICE \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].desiredCount' --output text 2>/dev/null || echo "1")

            # Container-level health, not just "is the task RUNNING". A task
            # counts as RUNNING throughout its 60s startPeriod — before /health
            # has passed even once — so running==desired alone can promote a slot
            # whose app is failing /health, flip traffic, and drain the old slot
            # into a dead deployment. Gate on the API tasks' healthStatus.
            HEALTH="none"
            if [[ "$RUNNING" =~ ^[0-9]+$ && "$RUNNING" == "$DESIRED" && "$RUNNING" != "0" ]]; then
              ARNS=$(aws ecs list-tasks \
                --cluster $CLUSTER --service-name $SERVICE --desired-status RUNNING \
                --region ${{ env.AWS_REGION }} \
                --query 'taskArns' --output text 2>/dev/null || echo "")
              if [[ -n "$ARNS" && "$ARNS" != "None" ]]; then
                HEALTH=$(aws ecs describe-tasks \
                  --cluster $CLUSTER --tasks $ARNS \
                  --region ${{ env.AWS_REGION }} \
                  --query 'tasks[].healthStatus' --output text 2>/dev/null || echo "none")
              fi
            fi

            # Worker and beat define no container health check, so they can only
            # be gated on runningCount == desiredCount — but they DO have to be
            # gated. Checking the API alone would promote (and later drain the
            # old slot) while the new slot's Celery worker or beat is crash-
            # looping, leaving the queue unprocessed with a green deploy.
            SIDECARS_OK=true
            SIDECAR_STATUS=""
            for svc in worker beat; do
              read -r S_RUN S_DES < <(aws ecs describe-services \
                --cluster $CLUSTER --services "nexusdeploy-${{ inputs.environment }}-$NEW_SLOT-$svc" \
                --region ${{ env.AWS_REGION }} \
                --query 'services[0].[runningCount,desiredCount]' --output text 2>/dev/null || echo "0 1")
              SIDECAR_STATUS="$SIDECAR_STATUS $svc=${S_RUN:-0}/${S_DES:-1}"
              if [[ ! "$S_RUN" =~ ^[0-9]+$ || "$S_RUN" != "$S_DES" || "$S_RUN" == "0" ]]; then
                SIDECARS_OK=false
              fi
            done

            echo "  api: $RUNNING/$DESIRED health=$HEALTH |$SIDECAR_STATUS (${ELAPSED}s elapsed)"

            # Healthy only when the API counts match AND every API task is
            # HEALTHY (no UNHEALTHY, no still-starting UNKNOWN) AND worker/beat
            # have reached their desired counts.
            if [[ "$RUNNING" =~ ^[0-9]+$ && "$RUNNING" == "$DESIRED" && "$RUNNING" != "0" \
                  && "$HEALTH" != "none" && "$HEALTH" != *UNHEALTHY* && "$HEALTH" != *UNKNOWN* \
                  && "$SIDECARS_OK" == "true" ]]; then
              echo "health_ok=true" >> $GITHUB_OUTPUT
              echo "✅ New slot is healthy (API tasks HEALTHY, worker+beat at desired count)!"
              exit 0
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "health_ok=false" >> $GITHUB_OUTPUT
          echo "❌ New slot failed to become healthy"

      - name: Run database init (ECS one-off task inside VPC)
        id: init_db
        if: ${{ inputs.run_init_db && steps.health.outputs.health_ok == 'true' }}
        # continue-on-error keeps the job alive so the rollback step can run, but
        # a non-zero exit is now recorded as steps.init_db.outcome == 'failure'
        # and BLOCKS promotion. Previously a failed migration still promoted the
        # slot and drained the old one — shipping a schema-broken deploy green.
        continue-on-error: true
        working-directory: terraform/environments/${{ inputs.environment }}
        run: |
          SECRET_ARN=$(terraform output -raw app_secret_arn 2>/dev/null | grep -v '│' | tail -1 || echo "")
          NEW_SLOT="${{ steps.slot.outputs.new_slot }}"
          CLUSTER="nexusdeploy-${{ inputs.environment }}-$NEW_SLOT"
          SUBNET_ID=$(terraform output -json private_app_subnet_ids 2>/dev/null | python3 -c "import sys,json; ids=json.load(sys.stdin); print(ids[0])" || echo "")
          SG_ID=$(terraform output -raw worker_sg_id 2>/dev/null | grep -v '│' | tail -1 || echo "")

          if [[ -z "$SECRET_ARN" || -z "$SUBNET_ID" || -z "$SG_ID" ]]; then
            echo "::error::Missing Terraform outputs (secret/subnet/sg) — cannot run init_db."
            exit 1
          fi

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "nexusdeploy-${{ inputs.environment }}-$NEW_SLOT-worker" \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          OVERRIDES='{"containerOverrides":[{"name":"worker","command":["python","-m","src.init_db"],"environment":[{"name":"ENV","value":"production"},{"name":"SEED_DB","value":"true"}]}]}'

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_ID],securityGroups=[$SG_ID],assignPublicIp=DISABLED}" \
            --overrides "$OVERRIDES" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' --output text)

          echo "Task ARN: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }}

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [[ "$EXIT_CODE" == "0" ]]; then
            echo "✅ Database initialized successfully"
          else
            echo "::error::init_db exited with code: $EXIT_CODE — refusing to promote a slot whose migration failed. Check /ecs/nexusdeploy/${{ inputs.environment }}-$NEW_SLOT/worker logs."
            exit 1
          fi

      - name: Evaluate promotion gate
        id: gate
        if: always()
        run: |
          # Single source of truth for "is this deploy good enough to promote".
          # Every downstream step (promote, image bookkeeping, drain, rollback,
          # job status) keys off this one output so the conditions cannot drift
          # apart. init_db is 'skipped' when run_init_db is false — only an
          # actual 'failure' blocks.
          if [[ "${{ steps.health.outputs.health_ok }}" == "true" \
                && "${{ steps.init_db.outcome }}" != "failure" ]]; then
            echo "promote=true" >> $GITHUB_OUTPUT
            echo "✅ Promotion gate passed."
          else
            echo "promote=false" >> $GITHUB_OUTPUT
            echo "❌ Promotion gate failed (health_ok=${{ steps.health.outputs.health_ok }}, init_db=${{ steps.init_db.outcome }})."
          fi

      # ORDERING IS THE POINT. active_slot is the flag every other actor keys off
      # — the next deploy picks its target from it, and cleanup.yml's reclaim
      # reads prev_*_image to decide which images the surviving slot keeps. SSM
      # has no multi-parameter transaction, so the writes are ordered instead:
      # every dependency of active_slot is committed BEFORE active_slot itself.
      #
      # If this step fails, the job fails with active_slot still naming the old
      # slot — which is true, because the old slot never stopped serving. The
      # next deploy then re-targets the same slot this run was using. Had the
      # order been reversed, a failure here would leave active_slot naming the
      # new slot with stale prev images, and the next deploy would resolve the
      # wrong rollback target.
      - name: Record deployed images as 'previous' for next deploy
        if: steps.gate.outputs.promote == 'true'
        run: |
          # The images just deployed become "previous" for the next rotation.
          # These inputs are already resolved by the caller (real image on an app
          # change, current running image on an infra-only deploy) and are never
          # empty — SSM rejects empty values.
          aws ssm put-parameter \
            --name "/nexusdeploy/${{ inputs.environment }}/deployment/prev_api_image" \
            --value "${{ inputs.api_image }}" \
            --type String --overwrite --region ${{ env.AWS_REGION }}
          aws ssm put-parameter \
            --name "/nexusdeploy/${{ inputs.environment }}/deployment/prev_worker_image" \
            --value "${{ inputs.worker_image }}" \
            --type String --overwrite --region ${{ env.AWS_REGION }}

      - name: Promote new slot (update SSM active_slot)
        if: steps.gate.outputs.promote == 'true'
        run: |
          # LAST write of the promotion. Everything it depends on is already
          # committed above, so this single put is the atomic cutover point.
          aws ssm put-parameter \
            --name "/nexusdeploy/${{ inputs.environment }}/deployment/active_slot" \
            --value "${{ steps.slot.outputs.new_slot }}" \
            --type String \
            --overwrite \
            --region ${{ env.AWS_REGION }}
          echo "✅ SSM active_slot updated to ${{ steps.slot.outputs.new_slot }} (generation ${{ github.run_id }})"

      - name: Schedule old slot drain
        if: steps.gate.outputs.promote == 'true' && steps.slot.outputs.current_slot != 'none'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'cleanup.yml',
                ref: '${{ inputs.drain_ref }}',
                inputs: {
                  environment: '${{ inputs.environment }}',
                  action: 'drain_old_slot',
                  old_slot: '${{ steps.slot.outputs.current_slot }}',
                  // Generation guard. The drain sleeps 2h/24h before acting, and
                  // a newer deploy can promote in that window — potentially back
                  // onto old_slot. cleanup.yml re-reads SSM after the sleep and
                  // aborts unless active_slot still equals this value, so a
                  // stale drain can never scale down the LIVE slot.
                  expected_active_slot: '${{ steps.slot.outputs.new_slot }}',
                  // Closes the ABA hole in expected_active_slot: slots only
                  // alternate, so two further promotions restore the expected
                  // value while the drain target has become the newest deploy's
                  // rollback slot. The generation never repeats.
                  expected_generation: '${{ github.run_id }}',
                  // The drain fires hours from now; pin it to the code this
                  // deploy applied so its "capacity-only" apply cannot pick up
                  // unrelated infrastructure commits landed in the meantime.
                  terraform_ref: '${{ github.sha }}',
                  delay_minutes: '${{ inputs.drain_minutes }}',
                  reason: 'Blue-green: draining old ${{ inputs.environment }} slot after ${{ inputs.drain_label }}'
                }
              });
              console.log('🕐 Old ${{ inputs.environment }} slot drain scheduled in ${{ inputs.drain_label }}');
            } catch (err) {
              if (err.status === 422) {
                console.warn('⚠️  cleanup.yml is disabled — skipping drain. Enable it in GitHub → Actions to restore auto-cleanup.');
              } else {
                throw err;
              }
            }

      - name: Rollback - revert to old slot
        id: rollback
        if: steps.gate.outputs.promote != 'true' && steps.slot.outputs.current_slot != 'none'
        continue-on-error: true
        working-directory: terraform/environments/${{ inputs.environment }}
        env:
          # Roll the whole environment back to the PREVIOUS images. With
          # deployment_slot pointing at the old slot, api_image is what lands on
          # the still-serving old slot — passing the new (broken) image here
          # would replace a healthy slot's task definition with the one that just
          # failed its health gate. Both vars therefore carry the previous image.
          TF_VAR_api_image: ${{ steps.prev_images.outputs.api }}
          TF_VAR_worker_image: ${{ steps.prev_images.outputs.worker }}
          TF_VAR_previous_api_image: ${{ steps.prev_images.outputs.api }}
          TF_VAR_previous_worker_image: ${{ steps.prev_images.outputs.worker }}
          TF_VAR_git_commit: ${{ github.sha }}
          TF_VAR_deployment_slot: ${{ steps.slot.outputs.current_slot }}
          # false → the failed NEW slot (now the inactive one) goes to 0.
          TF_VAR_keep_previous_slot_running: "false"
          TF_VAR_monitoring_allowed_cidr: ${{ vars.MONITORING_ALLOWED_CIDR }}
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
        run: |
          OLD_SLOT="${{ steps.slot.outputs.current_slot }}"
          NEW_SLOT="${{ steps.slot.outputs.new_slot }}"
          echo "⚠️  Deployment failed — rolling back to $OLD_SLOT"

          # The old slot NEVER stopped serving (the deploy applied with
          # keep_previous_slot_running=true), so rollback no longer has to
          # resurrect capacity — it only has to retire the failed new slot and
          # point the active_slot back. That is why the pre-apply capacity
          # capture is gone: there is nothing to restore.

          # Reassert active_slot=$OLD_SLOT.
          #
          # In the steady state this is a no-op: aws_ssm_parameter.active_slot
          # declares `lifecycle { ignore_changes = [value] }`, so Terraform only
          # sets the value when it CREATES the parameter — it does not flip on
          # update — and promotion is the only thing that writes the new slot.
          # It is not a no-op on the apply that first creates the parameter, and
          # it costs nothing to make the recorded slot unambiguous either way.
          #
          # Not `|| true`. If this genuinely cannot be written, active_slot may
          # name the failed slot, and the NEXT deploy would then read it, target
          # the still-serving OLD slot, and redeploy over live traffic. Retry,
          # and if it still fails say so loudly — but do not exit, because the
          # terraform apply below is the more important half of the rollback.
          SSM_RESTORED=false
          for attempt in 1 2 3; do
            if aws ssm put-parameter \
                --name "/nexusdeploy/${{ inputs.environment }}/deployment/active_slot" \
                --value "$OLD_SLOT" --type String --overwrite \
                --region ${{ env.AWS_REGION }}; then
              SSM_RESTORED=true
              break
            fi
            echo "⚠️  active_slot restore attempt $attempt failed; retrying..."
            sleep $((attempt * 5))
          done
          echo "ssm_restored=$SSM_RESTORED" >> $GITHUB_OUTPUT
          if [[ "$SSM_RESTORED" != "true" ]]; then
            echo "::error::Could not restore active_slot to $OLD_SLOT after 3 attempts. SSM may still name the FAILED slot $NEW_SLOT as active — the next deploy would then target $OLD_SLOT, which is serving live traffic. Fix this parameter by hand before deploying ${{ inputs.environment }} again."
          fi

          # reclaimed=false is the honest default: every early exit below leaves
          # the failed slot AT CAPACITY. Only the completed apply flips it true.
          echo "reclaimed=false" >> $GITHUB_OUTPUT

          # BOTH images, not just the API one. prev_api_image and
          # prev_worker_image come from two independent SSM reads that each fall
          # back to "placeholder" on their own transient error, so a real API
          # image alongside a placeholder worker is a reachable state — and with
          # deployment_slot pointing at the OLD slot, that apply would re-image
          # the still-serving worker with a task definition ECS cannot pull.
          # The deploy apply and the reclaim apply both already check the pair.
          if [[ -z "${TF_VAR_api_image:-}" || "${TF_VAR_api_image}" == "placeholder" || \
                -z "${TF_VAR_worker_image:-}" || "${TF_VAR_worker_image}" == "placeholder" ]]; then
            echo "::warning::Previous images did not fully resolve (api='${TF_VAR_api_image:-}', worker='${TF_VAR_worker_image:-}') — skipping the rollback apply to avoid re-imaging the live slot with a placeholder. $NEW_SLOT is left UP for debugging; active_slot points at $OLD_SLOT."
            exit 0
          fi

          if [[ -z "${TF_VAR_monitoring_allowed_cidr:-}" ]]; then
            echo "::warning::MONITORING_ALLOWED_CIDR unset — skipping rollback apply. active_slot points at $OLD_SLOT."
            exit 0
          fi
          if [[ "${TF_VAR_monitoring_allowed_cidr}" != \[* ]]; then
            export TF_VAR_monitoring_allowed_cidr='["'"${TF_VAR_monitoring_allowed_cidr}"'"]'
          fi

          # Terraform owns desired_count (it is NOT in the ECS module's
          # ignore_changes), so scaling the failed slot down has to go through an
          # apply. An `aws ecs update-service` here would be drift that the very
          # next deploy silently reverts.
          terraform apply -input=false -var-file=terraform.tfvars -auto-approve
          echo "reclaimed=true" >> $GITHUB_OUTPUT
          echo "✅ Rollback complete — $OLD_SLOT serving on previous images, $NEW_SLOT scaled to 0"

      - name: Mark deployment as failed
        # tf_apply is continue-on-error and the health gate exits 0 even on
        # timeout, so without this an unhealthy-and-rolled-back deploy would
        # report the job as green. Fail the job explicitly after rollback.
        if: always() && steps.gate.outputs.promote != 'true'
        run: |
          echo "::error::Deployment to ${{ inputs.environment }} failed the promotion gate (health=${{ steps.health.outputs.health_ok }}, init_db=${{ steps.init_db.outcome }})"
          # Do not claim a rollback that did not happen. The rollback step is
          # continue-on-error and has guarded early exits, so "we failed" and
          # "we cleaned up" are independent facts and must be reported as such.
          if [[ "${{ steps.slot.outputs.current_slot }}" == "none" ]]; then
            echo "::warning::First deploy — no previous slot to revert to. ${{ steps.slot.outputs.new_slot }} is left UP for debugging; tear it down manually when finished."
          elif [[ "${{ steps.rollback.outputs.reclaimed }}" == "true" ]]; then
            echo "Rollback succeeded: ${{ steps.slot.outputs.current_slot }} is serving and ${{ steps.slot.outputs.new_slot }} was scaled to 0."
          else
            echo "::error::ROLLBACK DID NOT COMPLETE (outcome=${{ steps.rollback.outcome }}). ${{ steps.slot.outputs.current_slot }} should still be serving — it was never scaled down — but the failed slot ${{ steps.slot.outputs.new_slot }} is STILL AT CAPACITY and still billing. Intervene manually."
          fi
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          if [[ "${{ steps.gate.outputs.promote }}" == "true" ]]; then
            echo "## ✅ ${{ inputs.environment }} Blue-Green Deployment Complete" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Previous slot | ${{ steps.slot.outputs.current_slot }} (still serving; drains in ${{ inputs.drain_label }}) |" >> $GITHUB_STEP_SUMMARY
            echo "| Active slot   | ${{ steps.slot.outputs.new_slot }} ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| Image         | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Health gate   | API HEALTHY + worker/beat at desired count |" >> $GITHUB_STEP_SUMMARY
          else
            # The heading has to agree with the table under it. "Rolled Back" is
            # only true when a rollback both applied AND had somewhere to roll
            # back to — a first deploy has no previous slot, and an incomplete
            # rollback has left the failed slot running.
            if [[ "${{ steps.slot.outputs.current_slot }}" == "none" ]]; then
              echo "## ❌ ${{ inputs.environment }} Deployment Failed - No Rollback Target (first deploy)" >> $GITHUB_STEP_SUMMARY
            elif [[ "${{ steps.rollback.outputs.reclaimed }}" == "true" ]]; then
              echo "## ❌ ${{ inputs.environment }} Deployment Failed - Rolled Back" >> $GITHUB_STEP_SUMMARY
            else
              echo "## ❌ ${{ inputs.environment }} Deployment Failed - ⚠️ Rollback Incomplete" >> $GITHUB_STEP_SUMMARY
            fi
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ steps.slot.outputs.current_slot }}" == "none" ]]; then
              echo "| Active slot remains | none — nothing was serving before this deploy |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Active slot remains | ${{ steps.slot.outputs.current_slot }} (never stopped serving) |" >> $GITHUB_STEP_SUMMARY
            fi
            if [[ "${{ steps.rollback.outputs.ssm_restored }}" == "false" ]]; then
              echo "| active_slot in SSM | ⚠️ **COULD NOT BE RESTORED** — verify by hand before redeploying |" >> $GITHUB_STEP_SUMMARY
            fi
            if [[ "${{ steps.rollback.outputs.reclaimed }}" == "true" ]]; then
              echo "| Failed slot         | ${{ steps.slot.outputs.new_slot }} (scaled to 0) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Failed slot         | ${{ steps.slot.outputs.new_slot }} ⚠️ **STILL AT CAPACITY** (rollback outcome: ${{ steps.rollback.outcome }}) |" >> $GITHUB_STEP_SUMMARY
            fi
            echo "| Health gate         | ${{ steps.health.outputs.health_ok }} |" >> $GITHUB_STEP_SUMMARY
            echo "| init_db             | ${{ steps.init_db.outcome }} |" >> $GITHUB_STEP_SUMMARY
          fi
