name: Cleanup - Destroy Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to target"
        required: true
        type: choice
        # prod IS destroyable here, but the destroy job runs under the `prod`
        # GitHub environment, so it blocks on manual approval. That gate — not
        # this list — is the guardrail. (There is no one-command local prod destroy.)
        options: [dev, staging, prod]
      action:
        description: "Action to perform"
        required: false
        default: "destroy"
        type: choice
        options: [destroy, drain_old_slot]
      old_slot:
        description: "Old blue-green slot to drain (slot1 or slot2) — drain_old_slot only"
        required: false
        default: ""
      expected_active_slot:
        description: "Generation guard: slot that must STILL be active for the drain to proceed — drain_old_slot only"
        required: false
        default: ""
      expected_generation:
        description: "Generation guard: deployment generation that must STILL be current — drain_old_slot only"
        required: false
        default: ""
      terraform_ref:
        description: "Immutable commit SHA the reclaim apply must use — drain_old_slot only"
        required: false
        default: ""
      delay_minutes:
        description: "Delay before action (minutes)"
        required: false
        default: "0"
      reason:
        description: "Reason for cleanup"
        required: false
        default: "Manual cleanup"

  # Nightly safety net — destroys any forgotten dev environments
  schedule:
    - cron: "0 0 * * *" # Midnight UTC

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  TF_STATE_BUCKET: nexusdeploy-terraform-state
  TF_LOCK_TABLE: nexusdeploy-terraform-locks
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment || 'dev' }}
    # Generous: this job sleeps up to delay_minutes (45 for the dev TTL path)
    # BEFORE running terraform destroy, so the cap must clear the sleep + destroy.
    timeout-minutes: 90
    runs-on: ubuntu-latest
    # Scheduled runs are always dev destroy. Manual runs skip destroy for drain_old_slot.
    if: github.event_name == 'schedule' || github.event.inputs.action != 'drain_old_slot'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Sleep BEFORE acquiring AWS credentials — the OIDC token is only
      # requested when configure-aws-credentials runs, so sleeping here
      # does not consume any credential TTL.
      - name: Wait for TTL delay
        if: github.event.inputs.delay_minutes != '0' && github.event.inputs.delay_minutes != ''
        run: |
          DELAY='${{ github.event.inputs.delay_minutes || 0 }}'
          if ! [[ "$DELAY" =~ ^[0-9]+$ ]]; then
            echo "❌ Invalid delay_minutes: must be a non-negative integer, got: $DELAY"
            exit 1
          fi
          # This job's timeout-minutes is 90 and it must still run terraform
          # destroy + fallback cleanup + state backup after the sleep. Cap the
          # delay at the documented 45-min dev-TTL path so a large manual value
          # can't cancel the job mid-run before anything is destroyed.
          if (( DELAY > 45 )); then
            echo "❌ Invalid delay_minutes: exceeds the maximum destroy delay (45)"
            exit 1
          fi
          echo "⏳ Waiting ${DELAY} minutes before cleanup..."
          echo "Reason: ${{ github.event.inputs.reason }}"
          sleep $((DELAY * 60))

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: Cleanup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ env.TF_ENV }}
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      # ── Step 1: Graceful Terraform destroy ──────────────────────────────
      - name: Terraform Destroy
        id: tf_destroy
        working-directory: terraform/environments/${{ env.TF_ENV }}
        env:
          TF_VAR_api_image: "placeholder"
          TF_VAR_worker_image: "placeholder"
          TF_VAR_git_commit: "cleanup"
          # Required by staging/prod (no default in variables.tf); unused for destroy
          TF_VAR_monitoring_allowed_cidr: "[]"
        run: |
          echo "🔥 Starting Terraform destroy for ${{ env.TF_ENV }}..."

          # dev uses a single module.ecs; staging/prod use blue-green split modules
          # plus an active_slot SSM parameter that must be destroyed too — the
          # state file is wiped afterwards, so anything skipped here becomes an
          # orphan that fails the next deploy with ParameterAlreadyExists.
          if [[ "${{ env.TF_ENV }}" == "staging" || "${{ env.TF_ENV }}" == "prod" ]]; then
            ECS_TARGETS="-target=module.ecs_slot1 -target=module.ecs_slot2 -target=aws_ssm_parameter.active_slot"
          else
            ECS_TARGETS="-target=module.ecs"
          fi

          terraform destroy \
            -input=false \
            -var-file="terraform.tfvars" \
            -auto-approve \
            -no-color \
            $ECS_TARGETS \
            -target=module.rds \
            -target=module.elasticache \
            -target=module.vpc \
            -target=module.security_groups \
            -target=module.monitoring \
            -target=module.iam.aws_iam_role.ecs_execution \
            -target=module.iam.aws_iam_role.ecs_execution_worker \
            -target=module.iam.aws_iam_role.ecs_task \
            -target=module.iam.aws_iam_role.vpc_flow_log \
            -target=module.iam.aws_iam_role_policy.ecs_execution_secrets \
            -target=module.iam.aws_iam_role_policy.ecs_execution_worker_secrets \
            -target=module.iam.aws_iam_role_policy.ecs_task_s3 \
            -target=module.iam.aws_iam_role_policy.vpc_flow_log \
            -target=module.iam.aws_iam_role_policy_attachment.ecs_execution_managed \
            -target=aws_secretsmanager_secret.app \
            -target=aws_secretsmanager_secret_version.app \
            -target=aws_secretsmanager_secret.init \
            -target=aws_secretsmanager_secret_version.init \
            -target=aws_secretsmanager_secret.seed \
            -target=aws_secretsmanager_secret_version.seed \
            2>&1 | tee destroy_output.txt
          echo "tf_destroy_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          # NOTE: module.iam (OIDC + deploy role) and module.ecr are excluded.
          # They are bootstrap-owned and must survive cleanup. See bootstrap.sh.
        continue-on-error: true # fallback script runs if this fails

      # ── Step 2: Fallback — tag-based nuke script ─────────────────────────
      - name: Fallback cleanup script (if Terraform failed)
        if: steps.tf_destroy.outputs.tf_destroy_exit != '0'
        run: |
          echo "⚠️ Terraform destroy failed — running tag-based cleanup script..."
          chmod +x scripts/cleanup.sh
          ./scripts/cleanup.sh \
            --env ${{ env.TF_ENV }} \
            --region ${{ env.AWS_REGION }} \
            --force

      # ECR images are intentionally NOT deleted during cleanup.
      # The lifecycle policy on each repo handles image retention automatically:
      #   - Keeps last 3 tagged images
      #   - Deletes untagged images after 1 day
      # Manually deleting images would incur unnecessary API calls and would
      # force a full image rebuild on the next deploy even if app code unchanged.

      # ── Step 3: Clean monitoring configs from S3 ────────────────────────
      # Delete only THIS environment's monitoring config objects. Configs are
      # env-scoped under monitoring/config/<env>/, so cleaning one environment
      # never removes another's — safe when dev and staging run in parallel.
      # The S3 bucket itself is NEVER deleted — it is bootstrap infrastructure
      # and holds all Terraform state.
      - name: Clean monitoring config objects from S3
        run: |
          echo "🧹 Cleaning monitoring config objects for ${{ env.TF_ENV }} from S3..."
          aws s3 rm             "s3://${{ env.TF_STATE_BUCKET }}/monitoring/config/${{ env.TF_ENV }}/"             --recursive             --region "${{ env.AWS_REGION }}" 2>/dev/null || true
          echo "✅ Monitoring configs cleaned for ${{ env.TF_ENV }} (bucket + other envs preserved)"

      # ── Step 4: Delete Terraform state from S3 ───────────────────────────
      - name: Delete Terraform state from S3
        run: |
          STATE_KEY="${{ env.TF_ENV }}/terraform.tfstate"

          if aws s3api head-object \
              --bucket "${{ env.TF_STATE_BUCKET }}" \
              --key "$STATE_KEY" \
              --region "${{ env.AWS_REGION }}" 2>/dev/null; then

            # Backup before deleting — abort if backup fails to prevent permanent loss
            if ! aws s3 cp \
              "s3://${{ env.TF_STATE_BUCKET }}/$STATE_KEY" \
              "s3://${{ env.TF_STATE_BUCKET }}/backups/${{ env.TF_ENV }}/terraform-$(date +%Y%m%d-%H%M%S).tfstate" \
              --region "${{ env.AWS_REGION }}"; then
              echo "❌ Failed to backup state file — aborting deletion to prevent data loss"
              exit 1
            fi

            aws s3 rm \
              "s3://${{ env.TF_STATE_BUCKET }}/$STATE_KEY" \
              --region "${{ env.AWS_REGION }}"

            echo "✅ State deleted and backed up"
          else
            echo "ℹ️ No state file found for ${{ env.TF_ENV }}"
          fi

          # Remove the S3-backend state-checksum row from the lock table.
          # Without this, a later `terraform init` fails with "checksum
          # calculated for the state stored in S3 does not match the checksum
          # stored in DynamoDB" because the digest outlives the deleted state.
          DIGEST_ID="${{ env.TF_STATE_BUCKET }}/$STATE_KEY-md5"
          aws dynamodb delete-item \
            --table-name "${{ env.TF_LOCK_TABLE }}" \
            --key "{\"LockID\":{\"S\":\"$DIGEST_ID\"}}" \
            --region "${{ env.AWS_REGION }}" 2>/dev/null \
          && echo "✅ Stale state digest removed from ${{ env.TF_LOCK_TABLE }}" \
          || echo "ℹ️ No state digest to remove"

          # Drop the lock mutex row too. Terraform releases it after a clean
          # destroy, but a killed/timed-out destroy leaves it stale and blocks
          # the next init/apply with "Error acquiring the state lock". Once the
          # env is torn down it is orphaned garbage, so removing it makes cleanup
          # self-healing. Safe here: nothing legitimately operates on an env that
          # is being destroyed.
          LOCK_ID="${{ env.TF_STATE_BUCKET }}/$STATE_KEY"
          aws dynamodb delete-item \
            --table-name "${{ env.TF_LOCK_TABLE }}" \
            --key "{\"LockID\":{\"S\":\"$LOCK_ID\"}}" \
            --region "${{ env.AWS_REGION }}" 2>/dev/null \
          && echo "✅ Stale state lock removed from ${{ env.TF_LOCK_TABLE }}" \
          || echo "ℹ️ No state lock to remove"

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Cleanup summary
        if: always()
        run: |
          echo "## 🧹 Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ env.TF_ENV }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ github.event.inputs.reason || 'Scheduled nightly cleanup' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Destroy | ${{ steps.tf_destroy.outputs.tf_destroy_exit == '0' && '✅ Success' || '⚠️ Used fallback script' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR Images | ✅ Managed by lifecycle policy |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | ✅ Preserved (bootstrap resource) |" >> $GITHUB_STEP_SUMMARY
          echo "| State File | 🗑️ Deleted (backed up) |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Blue-green: drain old slot after 24h health window
  # Triggered by deploy-prod after new slot is promoted.
  # Scales old ECS services to 0 — does NOT destroy infrastructure.
  # ─────────────────────────────────────────────
  # The wait and the reclaim are SEPARATE jobs on purpose.
  #
  # 1. Only the reclaim joins the blue-green-<env> concurrency group. The guard
  #    below reads active_slot and the apply acts on it moments later; without
  #    serialization a deploy promoting in that window would leave the guard
  #    stale and the apply would scale the newly-LIVE slot to 0. Terraform's
  #    DynamoDB lock does not help — it covers the apply, not the preceding SSM
  #    read. Sharing the group with the deploy job closes that window. Putting
  #    the multi-hour sleep in the group instead would block deploys for a day.
  # 2. Only the reclaim carries `environment:`, which for prod means a required
  #    reviewer. Previously the whole job did, so a 24h prod drain demanded an
  #    approval on EVERY 300-minute chunk (five of them). Now the sleeping half
  #    runs unattended and the approval is asked once, for the short apply.
  drain-wait:
    name: Drain delay (${{ github.event.inputs.old_slot }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'drain_old_slot'
    # Sleep chunk (max 300 min) must finish inside GitHub's 360-min job limit
    timeout-minutes: 350

    permissions:
      contents: read
      actions: write # needed to re-dispatch itself when delay > 300 min

    outputs:
      drain_now: ${{ steps.wait.outputs.drain_now }}

    steps:
      # GitHub kills hosted-runner jobs at 360 min, so prod's 24h drain delay
      # cannot sleep in a single job. Sleep at most 300 min per run; if delay
      # remains, re-dispatch this workflow with the remainder and skip the drain.
      - name: Wait for delay
        id: wait
        if: github.event.inputs.delay_minutes != '0' && github.event.inputs.delay_minutes != ''
        run: |
          DELAY='${{ github.event.inputs.delay_minutes || 0 }}'
          if ! [[ "$DELAY" =~ ^[0-9]+$ ]]; then
            echo "❌ Invalid delay_minutes: must be a non-negative integer, got: $DELAY"
            exit 1
          fi
          MAX_CHUNK=300
          if (( DELAY > MAX_CHUNK )); then
            echo "⏳ Delay ${DELAY} min exceeds job limit — sleeping ${MAX_CHUNK} min, then re-dispatching for the remaining $((DELAY - MAX_CHUNK)) min"
            echo "Reason: ${{ github.event.inputs.reason }}"
            sleep $((MAX_CHUNK * 60))
            echo "remaining=$((DELAY - MAX_CHUNK))" >> $GITHUB_OUTPUT
            echo "drain_now=false" >> $GITHUB_OUTPUT
          else
            echo "⏳ Waiting ${DELAY} minutes before draining old slot..."
            echo "Reason: ${{ github.event.inputs.reason }}"
            sleep $((DELAY * 60))
            echo "drain_now=true" >> $GITHUB_OUTPUT
          fi

      - name: Re-dispatch drain with remaining delay
        if: steps.wait.outputs.drain_now == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cleanup.yml',
              ref: context.ref,
              inputs: {
                environment: '${{ github.event.inputs.environment }}',
                action: 'drain_old_slot',
                old_slot: '${{ github.event.inputs.old_slot }}',
                expected_active_slot: '${{ github.event.inputs.expected_active_slot }}',
                expected_generation: '${{ github.event.inputs.expected_generation }}',
                terraform_ref: '${{ github.event.inputs.terraform_ref }}',
                delay_minutes: '${{ steps.wait.outputs.remaining }}',
                reason: '${{ github.event.inputs.reason }}'
              }
            });
            console.log('🔁 Drain re-dispatched with ${{ steps.wait.outputs.remaining }} min remaining');

  drain-reclaim:
    name: Reclaim old slot (${{ github.event.inputs.old_slot }})
    needs: drain-wait
    # drain_now is empty when the wait step was skipped (delay_minutes == 0),
    # which means "drain immediately" — so test for the explicit 'false'.
    if: needs.drain-wait.outputs.drain_now != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment }}

    # Shared with deploy-blue-green.yml's deploy job: the guard-then-apply pair
    # must not interleave with a deploy that promotes a slot.
    concurrency:
      group: blue-green-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    permissions:
      id-token: write
      contents: read

    env:
      TF_ENV: ${{ github.event.inputs.environment }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: DrainSlot-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generation guard — is this drain still current?
        id: guard
        run: |
          OLD_SLOT="${{ github.event.inputs.old_slot }}"
          EXPECTED="${{ github.event.inputs.expected_active_slot }}"
          EXPECTED_GEN="${{ github.event.inputs.expected_generation }}"
          ENV="${{ env.TF_ENV }}"

          if [[ -z "$OLD_SLOT" ]]; then
            echo "::error::old_slot input is required for drain_old_slot action"
            exit 1
          fi

          # This job was scheduled 2h (staging) or 24h (prod) ago, and it may
          # have been re-dispatched across several 300-min chunks since. Deploys
          # kept happening in that window, and because slots alternate, a newer
          # deploy can have promoted the very slot we were told to drain. Acting
          # on the stale instruction would scale down the LIVE environment.
          # So: re-read the truth NOW and only proceed if nothing has moved.
          set +e
          ACTIVE=$(aws ssm get-parameter \
            --name "/nexusdeploy/${ENV}/deployment/active_slot" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Parameter.Value' --output text 2>&1)
          RC=$?
          set -e

          if [[ $RC -ne 0 ]]; then
            echo "::error::Could not read active_slot from SSM (exit $RC). Refusing to drain on an unknown active slot."
            echo "$ACTIVE"
            exit 1
          fi

          if [[ "$ACTIVE" == "$OLD_SLOT" ]]; then
            echo "::warning::ABORTING drain — $OLD_SLOT is the ACTIVE slot now. A later deploy promoted it after this drain was scheduled."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ -n "$EXPECTED" && "$ACTIVE" != "$EXPECTED" ]]; then
            echo "::warning::ABORTING drain — expected active slot '$EXPECTED' but SSM says '$ACTIVE'. A newer deploy superseded this drain."
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # The slot comparison alone has an ABA hole: slots only alternate, so
          # after TWO further promotions active_slot is back to $EXPECTED and the
          # checks above pass again — while the slot we were told to drain is now
          # the latest deploy's rollback target, still inside ITS 2h/24h window.
          # Draining it there would silently delete that deploy's safety net.
          # The generation is a monotonic, non-repeating deploy identity (the
          # promoting run's id), so comparing it closes the hole outright.
          GEN=$(aws ssm get-parameter \
            --name "/nexusdeploy/${ENV}/deployment/generation" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")

          if [[ -n "$EXPECTED_GEN" ]]; then
            if [[ -z "$GEN" ]]; then
              echo "::error::expected_generation '$EXPECTED_GEN' was supplied but no generation parameter exists. Refusing to drain on an unverifiable generation."
              exit 1
            fi
            if [[ "$GEN" != "$EXPECTED_GEN" ]]; then
              echo "::warning::ABORTING drain — deployment generation is '$GEN', this drain was scheduled by generation '$EXPECTED_GEN'. A newer deploy superseded it."
              echo "proceed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            echo "⚠️  No expected_generation supplied (manual dispatch, or a drain scheduled before generations existed) — proceeding on the slot checks alone, which cannot detect an even number of intervening promotions."
          fi

          echo "✅ Guard passed: active=$ACTIVE, generation=${GEN:-n/a}, draining $OLD_SLOT."
          echo "active_slot=$ACTIVE" >> $GITHUB_OUTPUT
          echo "generation=$GEN" >> $GITHUB_OUTPUT
          echo "proceed=true" >> $GITHUB_OUTPUT

      # The drain used to be pure AWS CLI and needed no working tree; now that it
      # reclaims capacity through Terraform, it needs the config checked out.
      #
      # Pinned to the SHA the deploy ran, NOT the branch. This job fires 2h/24h
      # later, so a default checkout would resolve whatever the branch points at
      # by then and the "capacity-only" apply would quietly ship every unrelated
      # infrastructure commit merged in the meantime.
      - name: Checkout Terraform at the deployed revision
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.inputs.terraform_ref || github.sha }}

      - name: Setup Terraform
        if: steps.guard.outputs.proceed == 'true'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: steps.guard.outputs.proceed == 'true'
        working-directory: terraform/environments/${{ env.TF_ENV }}
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      - name: Reclaim old slot capacity (terraform apply)
        id: reclaim
        if: steps.guard.outputs.proceed == 'true'
        working-directory: terraform/environments/${{ env.TF_ENV }}
        env:
          TF_VAR_deployment_slot: ${{ steps.guard.outputs.active_slot }}
          # The whole point of the drain: drop the overlap the deploy put in
          # place, so the inactive slot finally goes to desired_count 0.
          TF_VAR_keep_previous_slot_running: "false"
          # Match the checked-out revision, not this run's SHA, so the tag
          # reflects the code actually being applied.
          TF_VAR_git_commit: ${{ github.event.inputs.terraform_ref || github.sha }}
          TF_VAR_monitoring_allowed_cidr: ${{ vars.MONITORING_ALLOWED_CIDR }}
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
        run: |
          ENV="${{ env.TF_ENV }}"

          # desired_count is NOT in the ECS module's ignore_changes, so Terraform
          # is authoritative over capacity. The old `aws ecs update-service
          # --desired-count 0` drain was therefore drift: it worked for minutes,
          # then the next deploy's apply put the drained slot straight back to 1.
          # Reclaiming through an apply is the only durable form of this step.
          #
          # SSM prev_*_image holds the images running on the ACTIVE slot (the
          # deploy writes them there after promotion), so feeding them back keeps
          # this apply a capacity-only change and never re-images a live slot.
          API_IMAGE=$(aws ssm get-parameter \
            --name "/nexusdeploy/${ENV}/deployment/prev_api_image" \
            --query 'Parameter.Value' --output text \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || echo "")
          WORKER_IMAGE=$(aws ssm get-parameter \
            --name "/nexusdeploy/${ENV}/deployment/prev_worker_image" \
            --query 'Parameter.Value' --output text \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || echo "")

          if [[ -z "$API_IMAGE" || -z "$WORKER_IMAGE" ]]; then
            echo "::error::Could not resolve the active slot's images from SSM — refusing to apply, as Terraform would fall back to the 'placeholder' default and re-image the live slot."
            exit 1
          fi

          export TF_VAR_api_image="$API_IMAGE"
          export TF_VAR_worker_image="$WORKER_IMAGE"
          export TF_VAR_previous_api_image="$API_IMAGE"
          export TF_VAR_previous_worker_image="$WORKER_IMAGE"

          if [[ -z "${TF_VAR_monitoring_allowed_cidr:-}" ]]; then
            echo "::error::MONITORING_ALLOWED_CIDR is not set for ${ENV}. Add it in GitHub → Settings → Environments → ${ENV} → Variables."
            exit 1
          fi
          if [[ "${TF_VAR_monitoring_allowed_cidr}" != \[* ]]; then
            export TF_VAR_monitoring_allowed_cidr='["'"${TF_VAR_monitoring_allowed_cidr}"'"]'
          fi

          echo "🔻 Reclaiming ${{ github.event.inputs.old_slot }} (active stays ${{ steps.guard.outputs.active_slot }})"
          terraform apply -input=false -var-file=terraform.tfvars -auto-approve
          echo "✅ Old slot ${{ github.event.inputs.old_slot }} drained to desired_count 0"

      - name: Drain summary
        if: always()
        run: |
          # Three distinct outcomes. Reporting "Drained" whenever the guard
          # passed would call a failed init or apply a success, and the old slot
          # would still be at capacity with nobody told.
          if [[ "${{ steps.guard.outputs.proceed }}" != "true" ]]; then
            echo "## 🛑 Blue-Green Drain Aborted (superseded)" >> $GITHUB_STEP_SUMMARY
            echo "The slot was left at capacity on purpose — a newer deploy owns the rotation." >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ steps.reclaim.outcome }}" == "success" ]]; then
            echo "## 🔻 Blue-Green Old Slot Drained" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Blue-Green Drain FAILED" >> $GITHUB_STEP_SUMMARY
            echo "The reclaim apply did not succeed — \`${{ github.event.inputs.old_slot }}\` is still at capacity and is still being billed. Re-run this drain once the cause is fixed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ env.TF_ENV }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target slot | \`${{ github.event.inputs.old_slot }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Expected active | \`${{ github.event.inputs.expected_active_slot }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actual active | \`${{ steps.guard.outputs.active_slot }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Expected generation | \`${{ github.event.inputs.expected_generation }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actual generation | \`${{ steps.guard.outputs.generation }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform revision | \`${{ github.event.inputs.terraform_ref || github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Reclaim result | \`${{ steps.reclaim.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
