name: Cleanup - Destroy Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to target"
        required: true
        type: choice
        options: [dev, staging, prod] # prod only valid for drain_old_slot action
      action:
        description: "Action to perform"
        required: false
        default: "destroy"
        type: choice
        options: [destroy, drain_old_slot]
      old_slot:
        description: "Old blue-green slot to drain (blue or green) — drain_old_slot only"
        required: false
        default: ""
      delay_minutes:
        description: "Delay before action (minutes)"
        required: false
        default: "0"
      reason:
        description: "Reason for cleanup"
        required: false
        default: "Manual cleanup"

  # Nightly safety net — destroys any forgotten dev environments
  schedule:
    - cron: "0 0 * * *" # Midnight UTC

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  TF_STATE_BUCKET: nexusdeploy-terraform-state
  TF_LOCK_TABLE: nexusdeploy-terraform-locks
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    # Scheduled runs are always dev destroy. Manual runs skip destroy for drain_old_slot.
    if: github.event_name == 'schedule' || github.event.inputs.action != 'drain_old_slot'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    env:
      TF_ENV: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v7

      # Sleep BEFORE acquiring AWS credentials — the OIDC token is only
      # requested when configure-aws-credentials runs, so sleeping here
      # does not consume any credential TTL.
      - name: Wait for TTL delay
        if: github.event.inputs.delay_minutes != '0' && github.event.inputs.delay_minutes != ''
        run: |
          DELAY='${{ github.event.inputs.delay_minutes || 0 }}'
          if ! [[ "$DELAY" =~ ^[0-9]+$ ]]; then
            echo "❌ Invalid delay_minutes: must be a non-negative integer, got: $DELAY"
            exit 1
          fi
          echo "⏳ Waiting ${DELAY} minutes before cleanup..."
          echo "Reason: ${{ github.event.inputs.reason }}"
          sleep $((DELAY * 60))

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: Cleanup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ env.TF_ENV }}
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"

      # ── Step 1: Graceful Terraform destroy ──────────────────────────────
      - name: Terraform Destroy
        id: tf_destroy
        working-directory: terraform/environments/${{ env.TF_ENV }}
        env:
          TF_VAR_api_image: "placeholder"
          TF_VAR_worker_image: "placeholder"
          TF_VAR_git_commit: "cleanup"
          # Required by staging/prod (no default in variables.tf); unused for destroy
          TF_VAR_monitoring_allowed_cidr: "[]"
        run: |
          echo "🔥 Starting Terraform destroy for ${{ env.TF_ENV }}..."

          # dev uses a single module.ecs; staging/prod use blue-green split modules
          # plus an active_slot SSM parameter that must be destroyed too — the
          # state file is wiped afterwards, so anything skipped here becomes an
          # orphan that fails the next deploy with ParameterAlreadyExists.
          if [[ "${{ env.TF_ENV }}" == "staging" || "${{ env.TF_ENV }}" == "prod" ]]; then
            ECS_TARGETS="-target=module.ecs_blue -target=module.ecs_green -target=aws_ssm_parameter.active_slot"
          else
            ECS_TARGETS="-target=module.ecs"
          fi

          terraform destroy \
            -input=false \
            -var-file="terraform.tfvars" \
            -auto-approve \
            -no-color \
            $ECS_TARGETS \
            -target=module.rds \
            -target=module.elasticache \
            -target=module.vpc \
            -target=module.security_groups \
            -target=module.monitoring \
            -target=module.iam.aws_iam_role.ecs_execution \
            -target=module.iam.aws_iam_role.ecs_execution_worker \
            -target=module.iam.aws_iam_role.ecs_task \
            -target=module.iam.aws_iam_role.vpc_flow_log \
            -target=module.iam.aws_iam_role_policy.ecs_execution_secrets \
            -target=module.iam.aws_iam_role_policy.ecs_execution_worker_secrets \
            -target=module.iam.aws_iam_role_policy.ecs_task_s3 \
            -target=module.iam.aws_iam_role_policy.vpc_flow_log \
            -target=module.iam.aws_iam_role_policy_attachment.ecs_execution_managed \
            -target=aws_secretsmanager_secret.app \
            -target=aws_secretsmanager_secret_version.app \
            -target=aws_secretsmanager_secret.init \
            -target=aws_secretsmanager_secret_version.init \
            2>&1 | tee destroy_output.txt
          echo "tf_destroy_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          # NOTE: module.iam (OIDC + deploy role) and module.ecr are excluded.
          # They are bootstrap-owned and must survive cleanup. See bootstrap.sh.
        continue-on-error: true # fallback script runs if this fails

      # ── Step 2: Fallback — tag-based nuke script ─────────────────────────
      - name: Fallback cleanup script (if Terraform failed)
        if: steps.tf_destroy.outputs.tf_destroy_exit != '0'
        run: |
          echo "⚠️ Terraform destroy failed — running tag-based cleanup script..."
          chmod +x scripts/cleanup.sh
          ./scripts/cleanup.sh \
            --env ${{ env.TF_ENV }} \
            --region ${{ env.AWS_REGION }} \
            --force

      # ECR images are intentionally NOT deleted during cleanup.
      # The lifecycle policy on each repo handles image retention automatically:
      #   - Keeps last 3 tagged images
      #   - Deletes untagged images after 1 day
      # Manually deleting images would incur unnecessary API calls and would
      # force a full image rebuild on the next deploy even if app code unchanged.

      # ── Step 3: Clean monitoring configs from S3 ────────────────────────
      # Delete the monitoring config objects uploaded by Terraform.
      # The S3 bucket itself is NEVER deleted — it is bootstrap infrastructure
      # and holds all Terraform state. Only the monitoring/config/ prefix is cleaned.
      - name: Clean monitoring config objects from S3
        run: |
          echo "🧹 Cleaning monitoring config objects from S3..."
          aws s3 rm             "s3://${{ env.TF_STATE_BUCKET }}/monitoring/config/"             --recursive             --region "${{ env.AWS_REGION }}" 2>/dev/null || true
          echo "✅ Monitoring configs cleaned (bucket itself preserved)"

      # ── Step 4: Delete Terraform state from S3 ───────────────────────────
      - name: Delete Terraform state from S3
        run: |
          STATE_KEY="${{ env.TF_ENV }}/terraform.tfstate"

          if aws s3api head-object \
              --bucket "${{ env.TF_STATE_BUCKET }}" \
              --key "$STATE_KEY" \
              --region "${{ env.AWS_REGION }}" 2>/dev/null; then

            # Backup before deleting — abort if backup fails to prevent permanent loss
            if ! aws s3 cp \
              "s3://${{ env.TF_STATE_BUCKET }}/$STATE_KEY" \
              "s3://${{ env.TF_STATE_BUCKET }}/backups/${{ env.TF_ENV }}/terraform-$(date +%Y%m%d-%H%M%S).tfstate" \
              --region "${{ env.AWS_REGION }}"; then
              echo "❌ Failed to backup state file — aborting deletion to prevent data loss"
              exit 1
            fi

            aws s3 rm \
              "s3://${{ env.TF_STATE_BUCKET }}/$STATE_KEY" \
              --region "${{ env.AWS_REGION }}"

            echo "✅ State deleted and backed up"
          else
            echo "ℹ️ No state file found for ${{ env.TF_ENV }}"
          fi

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Cleanup summary
        if: always()
        run: |
          echo "## 🧹 Cleanup Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ env.TF_ENV }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ github.event.inputs.reason || 'Scheduled nightly cleanup' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Destroy | ${{ steps.tf_destroy.outputs.tf_destroy_exit == '0' && '✅ Success' || '⚠️ Used fallback script' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR Images | ✅ Managed by lifecycle policy |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | ✅ Preserved (bootstrap resource) |" >> $GITHUB_STEP_SUMMARY
          echo "| State File | 🗑️ Deleted (backed up) |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Blue-green: drain old slot after 24h health window
  # Triggered by deploy-prod after new slot is promoted.
  # Scales old ECS services to 0 — does NOT destroy infrastructure.
  # ─────────────────────────────────────────────
  drain-old-slot:
    name: Drain old slot (${{ github.event.inputs.old_slot }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'drain_old_slot'
    # Sleep chunk (max 300 min) + drain must finish inside GitHub's 360-min job limit
    timeout-minutes: 350
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read
      actions: write # needed to re-dispatch itself when delay > 300 min

    env:
      TF_ENV: ${{ github.event.inputs.environment }}

    steps:
      # GitHub kills hosted-runner jobs at 360 min, so prod's 24h drain delay
      # cannot sleep in a single job. Sleep at most 300 min per run; if delay
      # remains, re-dispatch this workflow with the remainder and skip the drain.
      - name: Wait for delay
        id: wait
        if: github.event.inputs.delay_minutes != '0' && github.event.inputs.delay_minutes != ''
        run: |
          DELAY='${{ github.event.inputs.delay_minutes || 0 }}'
          if ! [[ "$DELAY" =~ ^[0-9]+$ ]]; then
            echo "❌ Invalid delay_minutes: must be a non-negative integer, got: $DELAY"
            exit 1
          fi
          MAX_CHUNK=300
          if (( DELAY > MAX_CHUNK )); then
            echo "⏳ Delay ${DELAY} min exceeds job limit — sleeping ${MAX_CHUNK} min, then re-dispatching for the remaining $((DELAY - MAX_CHUNK)) min"
            echo "Reason: ${{ github.event.inputs.reason }}"
            sleep $((MAX_CHUNK * 60))
            echo "remaining=$((DELAY - MAX_CHUNK))" >> $GITHUB_OUTPUT
            echo "drain_now=false" >> $GITHUB_OUTPUT
          else
            echo "⏳ Waiting ${DELAY} minutes before draining old slot..."
            echo "Reason: ${{ github.event.inputs.reason }}"
            sleep $((DELAY * 60))
            echo "drain_now=true" >> $GITHUB_OUTPUT
          fi

      - name: Re-dispatch drain with remaining delay
        if: steps.wait.outputs.drain_now == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cleanup.yml',
              ref: context.ref,
              inputs: {
                environment: '${{ github.event.inputs.environment }}',
                action: 'drain_old_slot',
                old_slot: '${{ github.event.inputs.old_slot }}',
                delay_minutes: '${{ steps.wait.outputs.remaining }}',
                reason: '${{ github.event.inputs.reason }}'
              }
            });
            console.log('🔁 Drain re-dispatched with ${{ steps.wait.outputs.remaining }} min remaining');

      - name: Configure AWS credentials (OIDC)
        if: steps.wait.outputs.drain_now != 'false'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: DrainSlot-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Scale down old slot
        if: steps.wait.outputs.drain_now != 'false'
        run: |
          OLD_SLOT="${{ github.event.inputs.old_slot }}"
          ENV="${{ env.TF_ENV }}"

          if [[ -z "$OLD_SLOT" ]]; then
            echo "❌ old_slot input is required for drain_old_slot action"
            exit 1
          fi

          CLUSTER="nexusdeploy-${ENV}-${OLD_SLOT}"
          echo "🔻 Draining old slot: $OLD_SLOT (cluster: $CLUSTER)"

          for svc in api worker beat; do
            SVC_NAME="nexusdeploy-${ENV}-${OLD_SLOT}-${svc}"
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SVC_NAME" \
              --desired-count 0 \
              --region "${{ env.AWS_REGION }}" 2>/dev/null \
            && echo "  ✅ Scaled down $SVC_NAME" \
            || echo "  ⚠️  $SVC_NAME not found or already stopped"
          done

          echo "✅ Old slot $OLD_SLOT drained"

      - name: Drain summary
        if: always() && steps.wait.outputs.drain_now != 'false'
        run: |
          echo "## 🔻 Blue-Green Old Slot Drained" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ env.TF_ENV }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Drained slot | \`${{ github.event.inputs.old_slot }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
